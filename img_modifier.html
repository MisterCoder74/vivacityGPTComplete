<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacityGPT Complete - AI Image Modifier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI Image Modifier</h1>

  <div class="container">
    <div class="image-box" id="original-image">
      <img id="uploaded-image" src="" alt="Uploaded Image" style="display: none;">
    </div>
    <div class="image-box" id="generated-image"></div>
  </div>

  <div id="voperations">
    <form enctype="multipart/form-data" method="POST">
      <input class="fixedwidth" type="file" accept=".jpg,.png" name="file" id="vfile-input">
      <div id="vfeedback"></div>
      <button id="vuploadBtn" class="btn btn-primary">Upload the image</button>
      <button type="button" class="btn btn-primary" onclick="getChatGPTResponseIMG();">Generate</button>
    </form>
  </div>

  <div id="text-box">
    <b>Insert your prompt</b><br>
    <textarea id="prompt" rows="6"></textarea>
  </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function resizeImage(img, containerWidth, containerHeight) {
  const imgWidth = img.naturalWidth;
  const imgHeight = img.naturalHeight;
  const imgRatio = imgWidth / imgHeight;
  const containerRatio = containerWidth / containerHeight;
  let newWidth, newHeight;
  if (imgRatio > containerRatio) {
    newWidth = containerWidth;
    newHeight = containerWidth / imgRatio;
  } else {
    newHeight = containerHeight;
    newWidth = containerHeight * imgRatio;
  }
  img.style.width = newWidth + 'px';
  img.style.height = newHeight + 'px';
}

$(document).ready(function () {
  $('#vuploadBtn').click(function (e) {
    e.preventDefault();
    $.ajax({
      url: 'vupload.php',
      type: 'POST',
      data: new FormData($('form')[0]),
      processData: false,
      contentType: false,
      success: function (response) {
        const data = JSON.parse(response);
        if (data.status === "success") {
          $('#vfeedback').html("Your file was uploaded.");
          var fileInput = document.getElementById('vfile-input');
          var file = fileInput.files[0];
          if (file) {
            var originalImageUrl = URL.createObjectURL(file);
            var img = $('#uploaded-image')[0];
            img.src = originalImageUrl;
            img.onload = function() {
              const container = $('#original-image')[0];
              const containerWidth = container.clientWidth - 16;
              const containerHeight = container.clientHeight - 16;
              resizeImage(img, containerWidth, containerHeight);
              $(img).show();
            };
          }
          $('#voperations button[type="button"]').attr('onclick', `submitImage("${data.url}");`);
        } else {
          $('#vfeedback').html(data);
        }
      }
    });
  });
});

async function submitImage() {
  const chatContainer = document.getElementById("generated-image");
  chatContainer.innerHTML = "";
  const typingIndicator = document.createElement("p");
  typingIndicator.id = "typing-indicator";
  typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
  chatContainer.appendChild(typingIndicator);
  const fileInput = document.getElementById('vfile-input');
  const file = fileInput.files[0];
  if (!file) {
    alert('Please upload an image file first.');
    return;
  }
  const formData = new FormData();
  formData.append("model", "gpt-image-1-mini");
  formData.append("image", file);
  formData.append("prompt", document.getElementById('prompt').value);
  const apikey = localStorage.getItem("openaikey");
  try {
    const response = await fetch("https://api.openai.com/v1/images/edits", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apikey}`
      },
      body: formData
    });
    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(`Error: ${errorData.error.message}`);
    }
    const data = await response.json();
    const imageBase64 = data.data[0].b64_json;
    const responseDiv = document.createElement("div");
    responseDiv.style.width = "100%";
    responseDiv.style.height = "100%";
    responseDiv.style.display = "flex";
    responseDiv.style.flexDirection = "column";
    responseDiv.style.alignItems = "center";
    responseDiv.style.justifyContent = "center";
    const image = document.createElement("img");
    image.src = `data:image/png;base64,${imageBase64}`;
    image.alt = "Generated Image";
    image.onload = function() {
      const container = document.getElementById("generated-image");
      const containerWidth = container.clientWidth - 16;
      const containerHeight = container.clientHeight - 56;
      resizeImage(image, containerWidth, containerHeight);
    };
    responseDiv.appendChild(image);
    const downloadLink = document.createElement("a");
    downloadLink.href = `data:image/png;base64,${imageBase64}`;
    downloadLink.download = "edited_image.png";
    downloadLink.textContent = "Download Image";
    downloadLink.className = "btn btn-primary";
    downloadLink.style.marginTop = "10px";
    responseDiv.appendChild(downloadLink);
    chatContainer.removeChild(typingIndicator);
    chatContainer.innerHTML = "";
    chatContainer.appendChild(responseDiv);
  } catch (error) {
    console.error(error);
    alert("An error occurred: " + error.message);
  }
}

let chatMemory = [];
chatMemory = createMemory([{
  role: "system",
  content: "You are an AI image analyzer and rebuilder."
}]);

function createMemory(messages) {
  const memory = [];
  for (const msg of messages) {
    memory.push({
      role: msg.role,
      content: msg.content
    });
  }
  return memory;
}

function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

window.addEventListener('resize', function() {
  const uploadedImg = document.getElementById('uploaded-image');
  if (uploadedImg.style.display !== 'none') {
    const container = document.getElementById('original-image');
    const containerWidth = container.clientWidth - 16;
    const containerHeight = container.clientHeight - 16;
    resizeImage(uploadedImg, containerWidth, containerHeight);
  }
  const generatedImg = document.querySelector('#generated-image img:not(.preloader)');
  if (generatedImg) {
    const container = document.getElementById('generated-image');
    const containerWidth = container.clientWidth - 16;
    const containerHeight = container.clientHeight - 56;
    resizeImage(generatedImg, containerWidth, containerHeight);
  }
});
</script>
</body>
</html>
