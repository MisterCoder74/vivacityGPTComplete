<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Presentation Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<main class="main-container">
  <h1 class="heading">AI Presentation Builder</h1>

  <div id="apikeySection">
    <input id="apikey" type="text" placeholder="Enter your API key">
  </div>

  <div id="inputSection">
    <textarea id="contentInput" placeholder="Enter content for your presentation..."></textarea>
    <button id="generateBtn" class="btn btn-primary">Generate Presentation</button>
  </div>

  <div class="error-message" id="errorMessage"></div>

  <div class="loading" id="loadingSection">
    <div class="loading-spinner"></div>
    <p>Generating presentation...</p>
  </div>

  <div id="slidesContainer">
    <div id="slides"></div>
    <div class="controls">
      <button id="editBtn" class="btn btn-secondary">Edit Content</button>
      <div class="export-buttons">
        <button id="exportPdfBtn" class="btn btn-secondary pdf-button">Export PDF</button>
        <button id="exportPptxBtn" class="btn btn-secondary pptx-button">Export PowerPoint</button>
      </div>
    </div>
  </div>
</main>

<script>
const inputSection = document.getElementById('inputSection');
const loadingSection = document.getElementById('loadingSection');
const slidesContainer = document.getElementById('slidesContainer');
const contentInput = document.getElementById('contentInput');
const generateBtn = document.getElementById('generateBtn');
const editBtn = document.getElementById('editBtn');
const errorMessage = document.getElementById('errorMessage');
const slidesDiv = document.getElementById('slides');

function showLoading() {
  inputSection.style.display = 'none';
  loadingSection.style.display = 'block';
  slidesContainer.style.display = 'none';
  errorMessage.style.display = 'none';
}

function showInput() {
  inputSection.style.display = 'block';
  loadingSection.style.display = 'none';
  slidesContainer.style.display = 'none';
  errorMessage.style.display = 'none';
}

function showSlides() {
  inputSection.style.display = 'none';
  loadingSection.style.display = 'none';
  slidesContainer.style.display = 'block';
}

function showError(message) {
  errorMessage.textContent = message;
  errorMessage.style.display = 'block';
  loadingSection.style.display = 'none';
}

async function generateStructure(text) {
  const apikey = document.getElementById("apikey").value;
  const response = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apikey}`
    },
    body: JSON.stringify({
      model: "gpt-4.1-nano",
      messages: [{
        role: "system",
        content: "You are a presentation expert. Generate a structure for maximum 2 professional slides from the provided text. Response must be valid JSON: [{title: string, points: string[], imagePrompt: string}]"
      }, {
        role: "user",
        content: text
      }],
      temperature: 0.7
    })
  });
  if (!response.ok) {
    const errorData = await response.json();
    throw new Error(errorData.error?.message || 'API Error');
  }
  const data = await response.json();
  var jsonResponse = data.choices[0].message.content;
  jsonResponse = jsonResponse.replace(/```json/g, "");
  try {
    return JSON.parse(jsonResponse);
  } catch (error) {
    throw new Error('JSON parse error: ' + error.message);
  }
}

async function generateImage(prompt) {
  const apikey = document.getElementById("apikey").value;
  try {
    const response = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apikey}`
      },
      body: JSON.stringify({
        model: "dall-e-2",
        prompt: prompt,
        n: 1,
        size: "512x512"
      })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API Error');
    return data.data[0].url;
  } catch (error) {
    throw new Error('Image generation error: ' + error.message);
  }
}

function renderSlides(slides) {
  slidesDiv.innerHTML = slides.map((slide, index) => `
    <div class="slide">
      <h2>Slide ${index + 1}: ${slide.title}</h2>
      <img src="${slide.imageUrl}" alt="${slide.title}" class="slide-image">
      <ul class="slide-points">
        ${slide.points.map(point => `<li>${point}</li>`).join('')}
      </ul>
    </div>
  `).join('');
}

generateBtn.addEventListener('click', async () => {
  const content = contentInput.value.trim();
  if (!content) {
    showError('Please enter content to generate the presentation');
    return;
  }
  showLoading();
  try {
    const structure = await generateStructure(content);
    const slidesWithImages = await Promise.all(
      structure.map(async (slide) => ({
        ...slide,
        imageUrl: await generateImage(slide.imagePrompt)
      }))
    );
    renderSlides(slidesWithImages);
    showSlides();
  } catch (error) {
    showError(error.message);
    setTimeout(showInput, 3000);
  }
});

editBtn.addEventListener('click', showInput);

async function exportToPDF() {
  const element = document.getElementById('slides');
  const opt = {
    margin: 1,
    filename: 'presentation.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
  };
  try {
    await html2pdf().set(opt).from(element).save();
  } catch (error) {
    showError('Error exporting PDF: ' + error.message);
  }
}

async function exportToPPTX() {
  let pptx = new PptxGenJS();
  const slides = document.querySelectorAll('.slide');
  try {
    for (const slide of slides) {
      const pptxSlide = pptx.addSlide();
      const title = slide.querySelector('h2').textContent;
      pptxSlide.addText(title, {
        x: 0.5,
        y: 0.5,
        w: '90%',
        fontSize: 24,
        bold: true,
        color: '1a73e8'
      });
      const img = slide.querySelector('img');
      const imgUrl = img.src;
      const base64Image = await convertImageToBase64(imgUrl);
      await pptxSlide.addImage({
        data: base64Image,
        x: 0.5,
        y: 1.5,
        w: 5,
        h: 3.5
      });
      const points = Array.from(slide.querySelectorAll('li')).map(li => li.textContent);
      points.forEach((point, idx) => {
        pptxSlide.addText(point, {
          x: 0.5,
          y: 5 + (idx * 0.4),
          w: '90%',
          fontSize: 14,
          bullet: true
        });
      });
    }
    pptx.layout = 'LAYOUT_WIDE';
    pptx.author = 'AI Presentation Builder';
    pptx.title = 'Generated Presentation';
    await pptx.writeFile('presentation.pptx');
  } catch (error) {
    console.error('Export error:', error);
    showError('Error exporting PowerPoint: ' + error.message);
  }
}

async function convertImageToBase64(imgUrl) {
  return new Promise((resolve, reject) => {
    const imgElement = new Image();
    imgElement.crossOrigin = 'Anonymous';
    imgElement.src = imgUrl;
    imgElement.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = imgElement.width;
      canvas.height = imgElement.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(imgElement, 0, 0);
      const base64Image = canvas.toDataURL('image/png');
      resolve(base64Image);
    };
    imgElement.onerror = (error) => {
      reject(new Error('Failed to load image: ' + imgUrl));
    };
  });
}

document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);
document.getElementById('exportPptxBtn').addEventListener('click', exportToPPTX);
</script>
</body>
</html>
