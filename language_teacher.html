<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VivacityGPT Complete - AI Language Teacher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI Language Teacher</h1>

  <div class="container">
    <div class="language-select">
      <label for="native"><b>What is your NATIVE language?</b></label>
      <select id="native">
        <option value="Italian">Italian</option>
        <option value="English" selected>English</option>
        <option value="French">French</option>
        <option value="Spanish">Spanish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Russian">Russian</option>
        <option value="Polish">Polish</option>
        <option value="Turk">Turk</option>
        <option value="German">German</option>
        <option value="Korean">Korean</option>
        <option value="Japanese">Japanese</option>
        <option value="Chinese">Chinese</option>
      </select>
    </div>

    <div class="language-select">
      <label for="languages"><b>What language do you want to LEARN?</b></label>
      <select id="languages">
        <option value="Italian" selected>Italian</option>
        <option value="English">English</option>
        <option value="French">French</option>
        <option value="Spanish">Spanish</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Russian">Russian</option>
        <option value="Polish">Polish</option>
        <option value="Turk">Turk</option>
        <option value="German">German</option>
        <option value="Korean">Korean</option>
        <option value="Japanese">Japanese</option>
        <option value="Chinese">Chinese</option>
        <option value="Toki Pona">Toki Pona</option>
      </select>
    </div>

    <div class="lessons-panel">
      <h3>Lessons:</h3>
      <div class="buttons-container">
        <button class="btn btn-primary" onclick="generatelesson('01')">Lesson 1</button>
        <button class="btn btn-primary" onclick="generatelesson('02')">Lesson 2</button>
        <button class="btn btn-primary" onclick="generatelesson('03')">Lesson 3</button>
        <button class="btn btn-primary" onclick="generatelesson('04')">Lesson 4</button>
        <button class="btn btn-primary" onclick="generatelesson('05')">Lesson 5</button>
        <button class="btn btn-primary" onclick="generatelesson('06')">Lesson 6</button>
        <button class="btn btn-primary" onclick="generatelesson('07')">Lesson 7</button>
        <button class="btn btn-primary" onclick="generatelesson('08')">Lesson 8</button>
        <button class="btn btn-primary" onclick="generatelesson('09')">Lesson 9</button>
        <button class="btn btn-primary" onclick="generatelesson('10')">Lesson 10</button>
        <button class="btn btn-primary" onclick="generatelesson('11')">Lesson 11</button>
        <button class="btn btn-primary" onclick="generatelesson('12')">Lesson 12</button>
        <button class="btn btn-primary" onclick="generatelesson('13')">Lesson 13</button>
        <button class="btn btn-primary" onclick="generatelesson('14')">Lesson 14</button>
      </div>
    </div>

    <div class="lesson-content">
      <h2 id="lesson-title">Lesson title</h2>
      <p id="lesson-description" style="text-align: justify;">
        The chatbot generated lesson will be displayed here. When generated, click on the button to generate the audio lesson.
      </p>
    </div>

    <button id="ttsgenerator" class="btn btn-primary" onclick="readlesson()">Read aloud</button>
    <audio id="audioPlayer" controls></audio>
  </div>
</main>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

let prompt = "";
function generatelesson(x) {
  const lessons = {
    "01": "Introduction of the language, alphabet and structure of the affirmative sentences",
    "02": "Greetings, introducing to someone, saying Thank you and I am sorry",
    "03": "Pronouns, Family, Friends, and Relationships",
    "04": "Verbs at the Present tense",
    "05": "Food and Beverages",
    "06": "Adjectives and how to describe people and places",
    "07": "Numbers, Date and Time, Seasons and Weather",
    "08": "Common phrases, formal and informal conversation",
    "09": "Asking for directions and help",
    "10": "Verbs at the past tense",
    "11": "Verbs at the future tense",
    "12": "Grammar cases: nominative, accusative, dative, genitive",
    "13": "Building articulated sentences with conjunctions",
    "14": "Typical idiomatic expressions"
  };
  if (lessons[x]) {
    prompt = lessons[x];
  } else {
    prompt = "Lesson number not valid.";
  }
  let selectedLanguage = document.getElementById("languages").value;
  let nativeLanguage = document.getElementById("native").value;
  document.getElementById("lesson-title").innerText = "Lesson " + x + ": " + prompt;
  getChatGPTResponse(nativeLanguage, selectedLanguage, prompt);
}

async function getChatGPTResponse(nativel, language, subject) {
  const apikey = localStorage.getItem("openaikey");
  console.log(apikey);
  if (apikey === "") {
    alert("No OpenAI API Key found.");
  } else {
    console.log(apikey);
  }
  const fullrequest = "I am " + nativel + " and want to learn the " + language + " language, please teach me the basis regarding " + subject + ". If the language uses a different alphabet, please transliterate into latin western-european alphabet, and always add a word bank and grammar notes. The lesson must be in my native language, " + nativel;
  console.log(language, subject, fullrequest);
  const chatContainer = document.getElementById("lesson-description");
  chatContainer.innerText = "";
  const typingIndicator = document.createElement("p");
  typingIndicator.id = "typing-indicator";
  typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
  chatContainer.appendChild(typingIndicator);
  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + apikey
      },
      body: JSON.stringify({
        model: "gpt-4.1-nano",
        messages: [{ role: "user", content: fullrequest }]
      })
    });
    if (!response.ok) {
      throw new Error("Error while requesting to the API");
    }
    const data = await response.json();
    if (!data.choices || !data.choices.length || !data.choices[0].message || !data.choices[0].message.content) {
      throw new Error("Invalid API response");
    }
    const chatGPTResponse = data.choices[0].message.content.trim();
    var cleanResponse = chatGPTResponse.replace(
      /(```html|```css|```javascript|```php|```python|```vb|```vb.net|cpp|java|csharp)(.*?)/gs,
      "$2"
    );
    console.log(chatGPTResponse);
    cleanResponse = cleanResponse.replace(/```/g, "");
    cleanResponse = cleanResponse.replace(/\*\*(.*?)\*\*/g, "$1").replace(/#/g, "");
    chatContainer.innerText = cleanResponse;
  } catch (error) {
    console.error(error);
    alert("An error occurred during the request. Check your OpenAI account or retry later.");
  }
}

function readlesson() {
  const apikey = localStorage.getItem("openaikey");
  console.log(apikey);
  const lesson = document.getElementById("lesson-description");
  const prompt = lesson.innerText;
  const selectedvoice = "nova";
  if (prompt) {
    fetch("https://api.openai.com/v1/audio/speech", {
      method: "POST",
      headers: {
        Authorization: `Bearer ${apikey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini-tts",
        input: prompt,
        voice: selectedvoice
      })
    })
      .then((response) => response.blob())
      .then((blob) => {
        const audioUrl = URL.createObjectURL(blob);
        const audioPlayer = document.getElementById("audioPlayer");
        audioPlayer.src = audioUrl;
        audioPlayer.play();
      })
      .catch((error) => {
        console.error("Error while converting TTS: ", error);
      });
  } else {
    alert("Please insert a text prompt before converting.");
  }
}
</script>
</body>
</html>
