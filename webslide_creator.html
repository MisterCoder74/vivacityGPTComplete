<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <style>
      /* Section visibility */
      .section { display: none; }
      .section.active { display: block; }

      /* Theme selector - colored boxes */
      .theme-selector {
        display: flex;
        gap: 15px;
        margin: 10px 0;
      }

      .theme-option {
        width: 60px;
        height: 60px;
        border-radius: 10px;
        cursor: pointer;
        border: 3px solid transparent;
        transition: all 0.3s ease;
      }

      .theme-option:hover {
        transform: scale(1.1);
      }

      .theme-option.active {
        border-color: #333;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
      }

      .theme-professional { background: linear-gradient(135deg, #0D8F81, #245668); }
      .theme-creative { background: linear-gradient(135deg, #ff6b6b, #4ecdc4); }
      .theme-minimal { background: linear-gradient(135deg, #2c3e50, #ecf0f1); }

      /* Template buttons */
      .templates {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 10px 0;
      }

      .template-btn {
        padding: 10px 20px;
        border: 2px solid var(--primary-teal);
        border-radius: 25px;
        cursor: pointer;
        background: white;
        color: var(--primary-teal);
        transition: all 0.3s ease;
      }

      .template-btn:hover, .template-btn.active {
        background: var(--primary-teal);
        color: white;
      }

      /* Form layout */
      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: var(--primary-dark);
      }

      .form-row {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }

      .form-group textarea {
        width: 100%;
        min-height: 150px;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        resize: vertical;
      }

      .form-group input[type="number"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
      }

      /* Character counter */
      .char-counter {
        text-align: right;
        font-size: 0.9em;
        color: #666;
        margin-top: 5px;
      }

      .char-counter.warning { color: orange; }
      .char-counter.error { color: red; }

      /* Loading section */
      .loading {
        text-align: center;
        padding: 40px;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid var(--primary-teal);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .progress {
        width: 100%;
        max-width: 400px;
        height: 20px;
        background: #f0f0f0;
        border-radius: 10px;
        margin: 20px auto;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--primary-teal), var(--primary-green));
        text-align: center;
        line-height: 20px;
        color: white;
        font-size: 0.9em;
        transition: width 0.3s ease;
      }

      /* Slides section */
      #slides {
        margin: 20px 0;
        min-height: 200px;
      }

      .slide {
        background: white;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }

      .slide h2 {
        color: var(--primary-dark);
        margin-bottom: 15px;
      }

      .slide ul {
        margin-left: 20px;
        margin-bottom: 20px;
      }

      .slide li {
        margin-bottom: 8px;
      }

      .slide-image {
        max-width: 100%;
        border-radius: 8px;
        margin-top: 15px;
      }

      /* Controls */
      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 2px solid #eee;
      }

      .export-buttons {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Messages */
      .error {
        background: #ffebee;
        color: #c62828;
        padding: 12px;
        border-radius: 8px;
        margin: 10px 0;
      }

      .success {
        background: #e8f5e9;
        color: #2e7d32;
        padding: 12px;
        border-radius: 8px;
        margin: 10px 0;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .form-row {
          grid-template-columns: 1fr;
        }

        .theme-selector {
          justify-content: center;
        }

        .templates {
          justify-content: center;
        }

        .controls {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
    <title>AI WebSlide Creator</title>
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI WebSlide Creator</h1>

  <div id="inputSection" class="section active">
    <div class="form-group">
      <label>WebSlide Theme</label>
      <div class="theme-selector">
        <div class="theme-option theme-professional active" data-theme="professional" title="Professional"></div>
        <div class="theme-option theme-creative" data-theme="creative" title="Creative"></div>
        <div class="theme-option theme-minimal" data-theme="minimal" title="Minimal"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Quick Templates</label>
      <div class="templates">
        <div class="template-btn" data-template="business">Business</div>
        <div class="template-btn" data-template="educational">Educational</div>
        <div class="template-btn" data-template="pitch">Pitch</div>
        <div class="template-btn" data-template="custom">Custom</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="contentInput">WebSlide content</label>
        <textarea id="contentInput" placeholder="Insert the content for your WebSlide creation..."></textarea>
        <div class="char-counter" id="charCounter">0 / 5000 chars</div>
      </div>
      <div class="form-group">
        <label for="slideCount">Number of Slides</label>
        <input id="slideCount" type="number" min="1" max="10" value="5">
      </div>
    </div>

    <button id="generateBtn" class="btn btn-primary">Generate</button>
  </div>

  <div id="loadingSection" class="section">
    <div class="loading">
      <div class="spinner"></div>
      <p id="loadingText">Generation in progress...</p>
      <div class="progress">
        <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
      </div>
    </div>
  </div>

  <div id="slidesSection" class="section">
    <div id="slides"></div>
    <div class="controls">
      <div>
        <button id="editBtn" class="btn btn-secondary">Edit content</button>
        <button id="saveProjectBtn" class="btn btn-primary">Save in memory</button>
      </div>
      <div class="export-buttons">
        <b>Export in: </b>
        <button id="exportHtmlBtn" class="btn btn-secondary">HTML</button>
        <button id="exportJsonBtn" class="btn btn-secondary">JSON</button>
      </div>
    </div>
  </div>

  <div id="download-message" style="display: none; padding: 10px; background-color: var(--accent-yellow); color: var(--dark-text); border-radius: 5px; margin-top: 20px;"></div>
  <div id="errorMessage" class="error" style="display: none;"></div>
  <div id="successMessage" class="success" style="display: none;"></div>
</main>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

const config = {
  maxChars: 5000,
  minChars: 10,
  themes: {
    professional: { primary: '#0D8F81', secondary: '#f8f9fa', accent: '#245668' },
    creative: { primary: '#ff6b6b', secondary: '#4ecdc4', accent: '#45b7d1' },
    minimal: { primary: '#2c3e50', secondary: '#ecf0f1', accent: '#34495e' }
  },
  templates: {
    business: "Create a professional business presentation about: ",
    educational: "Create an educational presentation about: ",
    pitch: "Create a pitch presentation about: ",
    custom: "Create a presentation about: "
  }
};

let state = {
  currentTheme: 'professional',
  currentTemplate: 'custom',
  currentProject: null,
  imageCache: new Map(),
  isGenerating: false
};

const elements = {
  inputSection: document.getElementById('inputSection'),
  loadingSection: document.getElementById('loadingSection'),
  slidesSection: document.getElementById('slidesSection'),
  contentInput: document.getElementById('contentInput'),
  slideCount: document.getElementById('slideCount'),
  generateBtn: document.getElementById('generateBtn'),
  editBtn: document.getElementById('editBtn'),
  errorMessage: document.getElementById('errorMessage'),
  successMessage: document.getElementById('successMessage'),
  slidesDiv: document.getElementById('slides'),
  charCounter: document.getElementById('charCounter'),
  progressBar: document.getElementById('progressBar'),
  loadingText: document.getElementById('loadingText')
};

function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById(sectionId).classList.add('active');
}

function showError(message) {
  elements.errorMessage.textContent = message;
  elements.errorMessage.style.display = 'block';
  elements.successMessage.style.display = 'none';
  setTimeout(() => {
    elements.errorMessage.style.display = 'none';
  }, 5000);
}

function showSuccess(message) {
  elements.successMessage.textContent = message;
  elements.successMessage.style.display = 'block';
  elements.errorMessage.style.display = 'none';
  setTimeout(() => {
    elements.successMessage.style.display = 'none';
  }, 3000);
}

function updateProgress(step, total, message) {
  const percentage = Math.round((step / total) * 100);
  elements.progressBar.style.width = percentage + '%';
  elements.progressBar.textContent = percentage + '%';
  elements.loadingText.textContent = message;
}

function updateCharCounter() {
  const length = elements.contentInput.value.length;
  elements.charCounter.textContent = `${length} / ${config.maxChars} chars`;
  elements.charCounter.className = 'char-counter';
  if (length > config.maxChars * 0.9) {
    elements.charCounter.classList.add('warning');
  }
  if (length > config.maxChars) {
    elements.charCounter.classList.add('error');
  }
}

elements.contentInput.addEventListener('input', updateCharCounter);

async function generateStructure(text, slideCount) {
  const apikey = localStorage.getItem("openaikey");
  if (apikey === "") {
    alert("No OpenAI API Key found.");
    return;
  }
  const templatePrefix = config.templates[state.currentTemplate];
  const fullPrompt = templatePrefix + text;
  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apikey}`
      },
      body: JSON.stringify({
        model: "gpt-4.1-nano",
        messages: [{
          role: "system",
          content: `You are a presentation expert. Generate a structure for exactly ${slideCount} professional slides from the provided text. Each slide must have a catchy title, 3-5 key points, and an image prompt. Response must be valid JSON: [{"title": "string", "points": ["string"], "imagePrompt": "string"}]`
        }, {
          role: "user",
          content: fullPrompt
        }],
        verbosity: "low"
      })
    });
    if (!response.ok) {
      throw new Error('API Error');
    }
    const data = await response.json();
    let jsonResponse = data.choices[0].message.content;
    jsonResponse = jsonResponse.replace(/```json\s*|\s*```/g, "").trim();
    try {
      const structure = JSON.parse(jsonResponse);
      if (!Array.isArray(structure) || structure.length === 0) {
        throw new Error('Invalid structure');
      }
      return structure;
    } catch (parseError) {
      throw new Error('JSON parse error: ' + parseError.message);
    }
  } catch (error) {
    console.error('Error generating structure:', error);
    throw error;
  }
}

elements.editBtn.addEventListener('click', () => {
  const messageDiv = document.getElementById('download-message');
  if (messageDiv) {
    messageDiv.innerHTML = '';
    messageDiv.style.display = 'none';
  }
  showSection('inputSection');
});

function applyTheme(themeName) {
  state.currentTheme = themeName;
  document.querySelectorAll('.theme-option').forEach(option => {
    option.classList.remove('active');
  });
  document.querySelector(`.theme-option[data-theme="${themeName}"]`).classList.add('active');
  if (state.currentProject) {
    state.currentProject.theme = themeName;
    renderSlides();
  }
}

function applyTemplate(templateName) {
  state.currentTemplate = templateName;
  document.querySelectorAll('.template-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  document.querySelector(`.template-btn[data-template="${templateName}"]`).classList.add('active');
  const templatePrefix = config.templates[templateName];
  const currentContent = elements.contentInput.value.trim();
  if (currentContent && !Object.values(config.templates).some(t => currentContent.startsWith(t.replace(': ', '')))) {
    elements.contentInput.value = templatePrefix + currentContent;
  } else if (!currentContent) {
    elements.contentInput.value = templatePrefix;
  }
  updateCharCounter();
}

function generateSlide(slideData, index) {
  const theme = config.themes[state.currentTheme];
  const slideDiv = document.createElement('div');
  slideDiv.className = 'slide';
  slideDiv.style.cssText = `
    background: white;
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow);
    margin-bottom: 2rem;
    overflow: hidden;
    border-left: 5px solid ${theme.primary};
  `;
  const slideHeader = document.createElement('div');
  slideHeader.style.cssText = `
    background: ${theme.primary};
    color: white;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  `;
  slideHeader.innerHTML = `
    <h3 style="margin: 0; font-size: 1.3rem;">Slide ${index + 1}</h3>
    <span style="font-size: 0.9rem; opacity: 0.9;">${slideData.title}</span>
  `;
  const slideContent = document.createElement('div');
  slideContent.style.cssText = 'padding: 1.5rem;';
  const titleEl = document.createElement('h2');
  titleEl.textContent = slideData.title;
  titleEl.style.cssText = `
    color: ${theme.primary};
    margin-bottom: 1rem;
    font-size: 1.5rem;
  `;
  const pointsList = document.createElement('ul');
  pointsList.style.cssText = 'margin: 1rem 0; padding-left: 1.5rem;';
  slideData.points.forEach(point => {
    const li = document.createElement('li');
    li.textContent = point;
    li.style.cssText = 'margin-bottom: 0.5rem; line-height: 1.5;';
    pointsList.appendChild(li);
  });
  const imageContainer = document.createElement('div');
  imageContainer.className = 'slide-image-container';
  imageContainer.style.cssText = `
    margin-top: 1.5rem;
    text-align: center;
    min-height: 200px;
    background: ${theme.secondary};
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
  `;
  if (slideData.imageUrl) {
    const img = document.createElement('img');
    img.src = slideData.imageUrl;
    img.alt = slideData.title;
    img.style.cssText = 'max-width: 100%; max-height: 400px; border-radius: var(--border-radius);';
    imageContainer.innerHTML = '';
    imageContainer.appendChild(img);
  } else {
    imageContainer.innerHTML = `
      <div style="color: ${theme.accent}; padding: 2rem;">
        <i class="fa fa-image" style="font-size: 3rem; display: block; margin-bottom: 1rem;"></i>
        <p>Image will appear here</p>
      </div>
    `;
  }
  slideContent.appendChild(titleEl);
  slideContent.appendChild(pointsList);
  slideContent.appendChild(imageContainer);
  slideDiv.appendChild(slideHeader);
  slideDiv.appendChild(slideContent);
  return slideDiv;
}

function renderSlides() {
  elements.slidesDiv.innerHTML = '';
  if (!state.currentProject || !state.currentProject.slides) return;
  state.currentProject.slides.forEach((slide, index) => {
    const slideEl = generateSlide(slide, index);
    elements.slidesDiv.appendChild(slideEl);
  });
}

async function generateImage(prompt) {
  const apikey = localStorage.getItem("openaikey");
  if (!apikey) {
    throw new Error("No OpenAI API Key found");
  }
  if (state.imageCache.has(prompt)) {
    return state.imageCache.get(prompt);
  }
  try {
    const response = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apikey}`
      },
      body: JSON.stringify({
        model: "dall-e-3",
        prompt: prompt,
        n: 1,
        size: "1024x1024"
      })
    });
    if (!response.ok) {
      const errorData = await response.json();
      throw new Error(errorData.error?.message || 'Image generation failed');
    }
    const data = await response.json();
    const imageUrl = data.data[0].url;
    state.imageCache.set(prompt, imageUrl);
    return imageUrl;
  } catch (error) {
    console.error('Error generating image:', error);
    throw error;
  }
}

function exportToHTML() {
  if (!state.currentProject || !state.currentProject.slides) {
    showError("No presentation to export");
    return;
  }
  const theme = config.themes[state.currentProject.theme];
  const slides = state.currentProject.slides;
  let slidesHTML = '';
  slides.forEach((slide, index) => {
    slidesHTML += `
    <div class="slide" style="background: white; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 2rem; overflow: hidden; border-left: 5px solid ${theme.primary}; page-break-after: always;">
      <div style="background: ${theme.primary}; color: white; padding: 1rem 1.5rem;">
        <h3 style="margin: 0; font-size: 1.3rem;">Slide ${index + 1}: ${slide.title}</h3>
      </div>
      <div style="padding: 1.5rem;">
        <h2 style="color: ${theme.primary}; margin-bottom: 1rem; font-size: 1.5rem;">${slide.title}</h2>
        <ul style="margin: 1rem 0; padding-left: 1.5rem;">
          ${slide.points.map(p => `<li style="margin-bottom: 0.5rem; line-height: 1.5;">${p}</li>`).join('')}
        </ul>
        ${slide.imageUrl ? `<div style="margin-top: 1.5rem; text-align: center;"><img src="${slide.imageUrl}" alt="${slide.title}" style="max-width: 100%; max-height: 400px; border-radius: 10px;"></div>` : ''}
      </div>
    </div>`;
  });
  const htmlContent = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${state.currentProject.theme.charAt(0).toUpperCase() + state.currentProject.theme.slice(1)} Presentation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, Helvetica, sans-serif; line-height: 1.6; color: #333; background: #f8f9fa; padding: 2rem; }
        .slide { page-break-inside: avoid; }
        @media print { body { background: white; padding: 0; } .slide { box-shadow: none !important; } }
    </style>
</head>
<body>
    ${slidesHTML}
</body>
</html>`;
  const blob = new Blob([htmlContent], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `presentation_${Date.now()}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSuccess("HTML exported successfully!");
}

function exportToJSON() {
  if (!state.currentProject) {
    showError("No project to export");
    return;
  }
  const projectData = JSON.stringify(state.currentProject, null, 2);
  const blob = new Blob([projectData], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `project_${Date.now()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showSuccess("JSON exported successfully!");
}

function saveProject() {
  if (!state.currentProject) {
    showError("No project to save");
    return;
  }
  try {
    localStorage.setItem('webslide_project', JSON.stringify(state.currentProject));
    showSuccess("Project saved to browser memory!");
  } catch (error) {
    showError("Failed to save project: " + error.message);
  }
}

function loadProject() {
  try {
    const saved = localStorage.getItem('webslide_project');
    if (saved) {
      state.currentProject = JSON.parse(saved);
      elements.contentInput.value = state.currentProject.content || '';
      elements.slideCount.value = state.currentProject.slideCount || 5;
      state.currentTheme = state.currentProject.theme || 'professional';
      state.currentTemplate = state.currentProject.template || 'custom';
      applyTheme(state.currentTheme);
      applyTemplate(state.currentTemplate);
      renderSlides();
      showSuccess("Project loaded from memory!");
      return true;
    }
  } catch (error) {
    showError("Failed to load project: " + error.message);
  }
  return false;
}

document.querySelectorAll('.theme-option').forEach(option => {
  option.addEventListener('click', () => {
    applyTheme(option.dataset.theme);
  });
});

document.querySelectorAll('.template-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    applyTemplate(btn.dataset.template);
  });
});

document.getElementById('exportHtmlBtn').addEventListener('click', exportToHTML);
document.getElementById('exportJsonBtn').addEventListener('click', exportToJSON);
document.getElementById('saveProjectBtn').addEventListener('click', saveProject);

elements.generateBtn.addEventListener('click', async () => {
  if (state.isGenerating) return;
  const content = elements.contentInput.value.trim();
  const slideCount = parseInt(elements.slideCount.value);
  const apikey = localStorage.getItem("openaikey");
  if (!apikey) {
    showError("Please set your OpenAI API key");
    return;
  }
  if (content.length < config.minChars) {
    showError(`Content must be at least ${config.minChars} characters`);
    return;
  }
  state.isGenerating = true;
  elements.generateBtn.disabled = true;
  showSection('loadingSection');
  elements.slidesDiv.innerHTML = '';
  try {
    updateProgress(0, slideCount + 1, 'Generating structure...');
    const structure = await generateStructure(content, slideCount);
    const slidesWithImages = [];
    for (let i = 0; i < structure.length; i++) {
      updateProgress(i + 1, slideCount + 1, `Generating image for slide ${i + 1} of ${structure.length}...`);
      let imageUrl = '';
      try {
        imageUrl = await generateImage(structure[i].imagePrompt);
      } catch (imgError) {
        console.warn(`Failed to generate image for slide ${i + 1}:`, imgError);
      }
      slidesWithImages.push({
        ...structure[i],
        imageUrl: imageUrl
      });
    }
    state.currentProject = {
      content: content,
      slideCount: slideCount,
      theme: state.currentTheme,
      template: state.currentTemplate,
      slides: slidesWithImages
    };
    renderSlides();
    showSection('slidesSection');
    showSuccess('WebSlide generated successfully!');
  } catch (error) {
    showError(error.message);
    setTimeout(() => showSection('inputSection'), 3000);
  } finally {
    state.isGenerating = false;
    elements.generateBtn.disabled = false;
  }
});

window.addEventListener('load', () => {
  loadProject();
});

updateCharCounter();
</script>
</body>
</html>
