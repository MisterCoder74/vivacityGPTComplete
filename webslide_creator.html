    <script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {

  } else {
    x.className = "topnav";
  }
}            
            
        // Configurazione globale
        const config = {
            maxChars: 5000,
            minChars: 10,
            themes: {
                professional: { primary: '#1a73e8', secondary: '#f8f9fa', accent: '#4285f4' },
                creative: { primary: '#ff6b6b', secondary: '#4ecdc4', accent: '#45b7d1' },
                minimal: { primary: '#2c3e50', secondary: '#ecf0f1', accent: '#34495e' }
            },
            templates: {
                business: "Crea una presentazione business professionale e convincente su: ",
                educational: "Crea una presentazione educativa chiara e coinvolgente su: ",
                pitch: "Crea una presentazione pitch persuasiva e accattivante per: ",
                custom: "Crea una presentazione su: "
            }
        };

        // Stato globale
        let state = {
            currentTheme: 'professional',
            currentTemplate: 'custom',
            currentProject: null,
            imageCache: new Map(),
            isGenerating: false
        };

        // Elementi DOM
        const elements = {
            inputSection: document.getElementById('inputSection'),
            loadingSection: document.getElementById('loadingSection'),
            slidesSection: document.getElementById('slidesSection'),
            contentInput: document.getElementById('contentInput'),
            slideCount: document.getElementById('slideCount'),
            generateBtn: document.getElementById('generateBtn'),
            editBtn: document.getElementById('editBtn'),
            errorMessage: document.getElementById('errorMessage'),
            successMessage: document.getElementById('successMessage'),
            slidesDiv: document.getElementById('slides'),
            charCounter: document.getElementById('charCounter'),
            progressBar: document.getElementById('progressBar'),
            loadingText: document.getElementById('loadingText')
        };

        // Utility Functions
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(sectionId).classList.add('active');
        }

        function showError(message) {
            elements.errorMessage.textContent = message;
            elements.errorMessage.style.display = 'block';
            elements.successMessage.style.display = 'none';
            setTimeout(() => {
                elements.errorMessage.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            elements.successMessage.textContent = message;
            elements.successMessage.style.display = 'block';
            elements.errorMessage.style.display = 'none';
            setTimeout(() => {
                elements.successMessage.style.display = 'none';
            }, 3000);
        }

        function updateProgress(step, total, message) {
            const percentage = Math.round((step / total) * 100);
            elements.progressBar.style.width = percentage + '%';
            elements.progressBar.textContent = percentage + '%';
            elements.loadingText.textContent = message;
        }

        function updateCharCounter() {
            const length = elements.contentInput.value.length;
            elements.charCounter.textContent = `${length} / ${config.maxChars} caratteri`;
            
            elements.charCounter.className = 'char-counter';
            if (length > config.maxChars * 0.9) {
                elements.charCounter.classList.add('warning');
            }
            if (length > config.maxChars) {
                elements.charCounter.classList.add('error');
            }
        }

        // Validation Functions
        function validateApiKey(key) {
            if (!key || !key.startsWith('sk-') || key.length < 40) {
                throw new Error('Invalid API Key. Must begin with "sk-" and have a length of at least 40 chars');
            }
            return true;
        }

        function validateInput(content) {
            if (!content || content.trim().length < config.minChars) {
                throw new Error(`Il contenuto deve essere di almeno ${config.minChars} caratteri`);
            }
            if (content.length > config.maxChars) {
                throw new Error(`Il contenuto è troppo lungo (max ${config.maxChars} caratteri)`);
            }
            return true;
        }

        // API Functions
        async function generateStructure(text, slideCount) {
            const apikey = localStorage.getItem("openaikey");
			console.log(apikey);

			if (apikey === "") {
			alert("No OpenAI API Key found. Go to the index page and add your OpenAI Key to the setup panel.");
			return; // Aggiunto per evitare ulteriori elaborazioni in caso di errore.
			}
            validateApiKey(apikey);
            
            const templatePrefix = config.templates[state.currentTemplate];
            const fullPrompt = templatePrefix + text;
            
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apikey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-5-nano",
                        messages: [{
                            role: "system",
                            content: `Sei un esperto di presentazioni. Genera una struttura per esattamente ${slideCount} slide professionali partendo dal testo fornito. Ogni slide deve avere un titolo accattivante, dai 3 ai 5 punti chiave ben strutturati, e un prompt per immagine descrittivo. Assicurati che nel prompt per immagine sia specificato di non includere testo o scritte di alcun genere nell'immagine. La risposta deve essere in formato JSON valido con questa struttura: [{"title": "string", "points": ["string"], "imagePrompt": "string"}]`
                        }, {
                            role: "user",
                            content: fullPrompt
                        }],
                        //temperature: 0.2
                          verbosity: "low"  
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    let errorMsg = 'Errore API';
                    if (response.status === 401) errorMsg = 'API Key non valida o scaduta';
                    else if (response.status === 429) errorMsg = 'Troppi tentativi, riprova tra poco';
                    else if (response.status === 400) errorMsg = 'Richiesta non valida';
                    throw new Error(errorMsg + ': ' + (errorData.error?.message || ''));
                }

                const data = await response.json();
                let jsonResponse = data.choices[0].message.content;
                
                // Pulizia JSON più robusta
                jsonResponse = jsonResponse.replace(/```json\s*|\s*```/g, "").trim();
                
                try {
                    const structure = JSON.parse(jsonResponse);
                    if (!Array.isArray(structure) || structure.length === 0) {
                        throw new Error('Struttura non valida generata dall\'AI');
                    }
                    return structure;
                } catch (parseError) {
                    throw new Error('Errore nell\'analisi del JSON generato: ' + parseError.message);
                }
            } catch (error) {
                console.error('Errore generazione struttura:', error);
                throw error;
            }
        }

        async function generateImageCached(prompt) {
            if (state.imageCache.has(prompt)) {
                return state.imageCache.get(prompt);
            }
            
            const imageUrl = await generateImage(prompt);
            state.imageCache.set(prompt, imageUrl);
            return imageUrl;
        }

        async function generateImage(prompt) {
                        const apikey = localStorage.getItem("openaikey");
			console.log(apikey);
            
            try {
                const response = await fetch('https://api.openai.com/v1/images/generations', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apikey}`
                    },
                    body: JSON.stringify({
                        model: "dall-e-2",
                        prompt: `Professional presentation slide image: ${prompt}. The image must not contain any text. Clean, modern, business appropriate style.`,
                        n: 1,
                        size: "512x512"
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error('Errore generazione immagine: ' + (errorData.error?.message || 'Errore sconosciuto'));
                }

                const data = await response.json();
                return data.data[0].url;
            } catch (error) {
                console.error('Errore nella generazione dell\'immagine:', error);
                // Ritorna un placeholder invece di fallire
                return `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512"><rect width="512" height="512" fill="${config.themes[state.currentTheme].primary}"/><text x="256" y="256" text-anchor="middle" dy=".3em" fill="white" font-family="system-ui" font-size="24">Immagine non disponibile</text></svg>`;
            }
        }

        // Rendering Functions
        function renderSlides(slides) {
            const theme = config.themes[state.currentTheme];
            
            elements.slidesDiv.innerHTML = slides.map((slide, index) => `
                <div class="slide" style="border-left: 4px solid ${theme.primary};">
                    <div class="slide-header" style="background: ${theme.primary};">
                        <h2 class="slide-title">Slide ${index + 1}: ${slide.title}</h2>
                    </div>
                    <div class="slide-content">
                        <img src="${slide.imageUrl}" alt="${slide.title}" class="slide-image" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;200&quot; height=&quot;150&quot; viewBox=&quot;0 0 200 150&quot;><rect width=&quot;200&quot; height=&quot;150&quot; fill=&quot;${theme.secondary}&quot;/><text x=&quot;100&quot; y=&quot;75&quot; text-anchor=&quot;middle&quot; dy=&quot;.3em&quot; fill=&quot;${theme.primary}&quot; font-family=&quot;system-ui&quot; font-size=&quot;14&quot;>Immagine non disponibile</text></svg>'">
                        <div class="slide-text">
                            <ul class="slide-points">
                                ${slide.points.map(point => `<li>${point}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function renderSlideProgressively(slide, index) {
            const theme = config.themes[state.currentTheme];
            const slideHtml = `
                <div class="slide" style="border-left: 4px solid ${theme.primary};">
                    <div class="slide-header" style="background: ${theme.primary};">
                        <h2 class="slide-title">Slide ${index + 1}: ${slide.title}</h2>
                    </div>
                    <div class="slide-content">
                        <div class="slide-image" style="width: 200px; height: 150px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
                            <div class="spinner" style="width: 30px; height: 30px;"></div>
                        </div>
                        <div class="slide-text">
                            <ul class="slide-points">
                                ${slide.points.map(point => `<li>${point}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
            
            elements.slidesDiv.insertAdjacentHTML('beforeend', slideHtml);
            
            // Genera immagine e aggiorna
            try {
                const imageUrl = await generateImageCached(slide.imagePrompt);
                const slideElement = elements.slidesDiv.children[index];
                const imgPlaceholder = slideElement.querySelector('.slide-content > div');
                imgPlaceholder.outerHTML = `<img src="${imageUrl}" alt="${slide.title}" class="slide-image">`;
            } catch (error) {
                console.warn('Errore caricamento immagine per slide', index + 1);
            }
        }

        // Project Management
        function saveProject(slides) {
            const project = {
                content: elements.contentInput.value,
                slideCount: parseInt(elements.slideCount.value),
                theme: state.currentTheme,
                template: state.currentTemplate,
                slides: slides,
                timestamp: new Date().toISOString()
            };
            state.currentProject = project;
            showSuccess('Project saved in memory!');
        }

        // Export Functions


// Funzione helper per convertire immagini in base64
async function convertImageToBase64(url) {
    try {
        // Prova prima con fetch
        const response = await fetch(url);
        const blob = await response.blob();
        
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    } catch (error) {
        // Fallback: usa canvas per convertire l'immagine
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                
                ctx.drawImage(img, 0, 0);
                
                try {
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    resolve(base64);
                } catch (canvasError) {
                    reject(canvasError);
                }
            };
            
            img.onerror = () => reject(new Error('Impossibile caricare l\'immagine'));
            img.src = url;
        });
    }
}
