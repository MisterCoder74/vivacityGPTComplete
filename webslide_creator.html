<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <title>AI WebSlide Creator</title>
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI WebSlide Creator</h1>

  <div id="inputSection" class="section active">
    <div class="form-group">
      <label>WebSlide Theme</label>
      <div class="theme-selector">
        <div class="theme-option theme-professional active" data-theme="professional" title="Professional"></div>
        <div class="theme-option theme-creative" data-theme="creative" title="Creative"></div>
        <div class="theme-option theme-minimal" data-theme="minimal" title="Minimal"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Quick Templates</label>
      <div class="templates">
        <div class="template-btn" data-template="business">Business</div>
        <div class="template-btn" data-template="educational">Educational</div>
        <div class="template-btn" data-template="pitch">Pitch</div>
        <div class="template-btn" data-template="custom">Custom</div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="contentInput">WebSlide content</label>
        <textarea id="contentInput" placeholder="Insert the content for your WebSlide creation..."></textarea>
        <div class="char-counter" id="charCounter">0 / 5000 chars</div>
      </div>
      <div class="form-group">
        <label for="slideCount">Number of Slides</label>
        <input id="slideCount" type="number" min="1" max="10" value="5">
      </div>
    </div>

    <button id="generateBtn" class="btn btn-primary">Generate</button>
  </div>

  <div id="loadingSection" class="section">
    <div class="loading">
      <div class="spinner"></div>
      <p id="loadingText">Generation in progress...</p>
      <div class="progress">
        <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
      </div>
    </div>
  </div>

  <div id="slidesSection" class="section">
    <div id="slides"></div>
    <div class="controls">
      <div>
        <button id="editBtn" class="btn btn-secondary">Edit content</button>
        <button id="saveProjectBtn" class="btn btn-primary">Save in memory</button>
      </div>
      <div class="export-buttons">
        <b>Export in: </b>
        <button id="exportHtmlBtn" class="btn btn-secondary">HTML</button>
        <button id="exportJsonBtn" class="btn btn-secondary">JSON</button>
      </div>
    </div>
  </div>

  <div id="download-message" style="display: none; padding: 10px; background-color: var(--accent-yellow); color: var(--dark-text); border-radius: 5px; margin-top: 20px;"></div>
  <div id="errorMessage" class="error" style="display: none;"></div>
  <div id="successMessage" class="success" style="display: none;"></div>
</main>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

const config = {
  maxChars: 5000,
  minChars: 10,
  themes: {
    professional: { primary: '#0D8F81', secondary: '#f8f9fa', accent: '#245668' },
    creative: { primary: '#ff6b6b', secondary: '#4ecdc4', accent: '#45b7d1' },
    minimal: { primary: '#2c3e50', secondary: '#ecf0f1', accent: '#34495e' }
  },
  templates: {
    business: "Create a professional business presentation about: ",
    educational: "Create an educational presentation about: ",
    pitch: "Create a pitch presentation about: ",
    custom: "Create a presentation about: "
  }
};

let state = {
  currentTheme: 'professional',
  currentTemplate: 'custom',
  currentProject: null,
  imageCache: new Map(),
  isGenerating: false
};

const elements = {
  inputSection: document.getElementById('inputSection'),
  loadingSection: document.getElementById('loadingSection'),
  slidesSection: document.getElementById('slidesSection'),
  contentInput: document.getElementById('contentInput'),
  slideCount: document.getElementById('slideCount'),
  generateBtn: document.getElementById('generateBtn'),
  editBtn: document.getElementById('editBtn'),
  errorMessage: document.getElementById('errorMessage'),
  successMessage: document.getElementById('successMessage'),
  slidesDiv: document.getElementById('slides'),
  charCounter: document.getElementById('charCounter'),
  progressBar: document.getElementById('progressBar'),
  loadingText: document.getElementById('loadingText')
};

function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(section => {
    section.classList.remove('active');
  });
  document.getElementById(sectionId).classList.add('active');
}

function showError(message) {
  elements.errorMessage.textContent = message;
  elements.errorMessage.style.display = 'block';
  elements.successMessage.style.display = 'none';
  setTimeout(() => {
    elements.errorMessage.style.display = 'none';
  }, 5000);
}

function showSuccess(message) {
  elements.successMessage.textContent = message;
  elements.successMessage.style.display = 'block';
  elements.errorMessage.style.display = 'none';
  setTimeout(() => {
    elements.successMessage.style.display = 'none';
  }, 3000);
}

function updateProgress(step, total, message) {
  const percentage = Math.round((step / total) * 100);
  elements.progressBar.style.width = percentage + '%';
  elements.progressBar.textContent = percentage + '%';
  elements.loadingText.textContent = message;
}

function updateCharCounter() {
  const length = elements.contentInput.value.length;
  elements.charCounter.textContent = `${length} / ${config.maxChars} chars`;
  elements.charCounter.className = 'char-counter';
  if (length > config.maxChars * 0.9) {
    elements.charCounter.classList.add('warning');
  }
  if (length > config.maxChars) {
    elements.charCounter.classList.add('error');
  }
}

elements.contentInput.addEventListener('input', updateCharCounter);

async function generateStructure(text, slideCount) {
  const apikey = localStorage.getItem("openaikey");
  if (apikey === "") {
    alert("No OpenAI API Key found.");
    return;
  }
  const templatePrefix = config.templates[state.currentTemplate];
  const fullPrompt = templatePrefix + text;
  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apikey}`
      },
      body: JSON.stringify({
        model: "gpt-5-nano",
        messages: [{
          role: "system",
          content: `You are a presentation expert. Generate a structure for exactly ${slideCount} professional slides from the provided text. Each slide must have a catchy title, 3-5 key points, and an image prompt. Response must be valid JSON: [{"title": "string", "points": ["string"], "imagePrompt": "string"}]`
        }, {
          role: "user",
          content: fullPrompt
        }],
        verbosity: "low"
      })
    });
    if (!response.ok) {
      throw new Error('API Error');
    }
    const data = await response.json();
    let jsonResponse = data.choices[0].message.content;
    jsonResponse = jsonResponse.replace(/```json\s*|\s*```/g, "").trim();
    try {
      const structure = JSON.parse(jsonResponse);
      if (!Array.isArray(structure) || structure.length === 0) {
        throw new Error('Invalid structure');
      }
      return structure;
    } catch (parseError) {
      throw new Error('JSON parse error: ' + parseError.message);
    }
  } catch (error) {
    console.error('Error generating structure:', error);
    throw error;
  }
}

elements.generateBtn.addEventListener('click', async () => {
  if (state.isGenerating) return;
  const content = elements.contentInput.value.trim();
  const slideCount = parseInt(elements.slideCount.value);
  const apikey = localStorage.getItem("openaikey");
  if (!apikey) {
    showError("Please set your OpenAI API key");
    return;
  }
  if (content.length < config.minChars) {
    showError(`Content must be at least ${config.minChars} characters`);
    return;
  }
  state.isGenerating = true;
  elements.generateBtn.disabled = true;
  showSection('loadingSection');
  elements.slidesDiv.innerHTML = '';
  try {
    updateProgress(0, 3, 'Generating structure...');
    const structure = await generateStructure(content, slideCount);
    updateProgress(1, 3, 'Structure generated, creating slides...');
    showSection('slidesSection');
    for (let i = 0; i < structure.length; i++) {
      updateProgress(2, 3, `Generating slide ${i + 1} of ${structure.length}...`);
    }
    const slidesWithImages = structure.map((slide, index) => ({
      ...slide,
      imageUrl: ''
    }));
    state.currentProject = {
      content: content,
      slideCount: slideCount,
      theme: state.currentTheme,
      template: state.currentTemplate,
      slides: slidesWithImages
    };
    showSuccess('WebSlide generated successfully!');
  } catch (error) {
    showError(error.message);
    setTimeout(() => showSection('inputSection'), 3000);
  } finally {
    state.isGenerating = false;
    elements.generateBtn.disabled = false;
  }
});

elements.editBtn.addEventListener('click', () => {
  const messageDiv = document.getElementById('download-message');
  if (messageDiv) {
    messageDiv.innerHTML = '';
    messageDiv.style.display = 'none';
  }
  showSection('inputSection');
});

updateCharCounter();
</script>
</body>
</html>
