<!DOCTYPE html>
<html lang="en">
<head>
<title>VivacityGPT Complete - Web Dev Bot</title>        
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>

<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html" class="active">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">OpenAI Web Dev Bot</h1>
  <hr>
  <div class="card mb-2">
    <input type="password" id="apikey" placeholder="Your API key" readonly><br>
    <textarea rows=6 type="text" id="prompt" placeholder="Your prompt" autocomplete="off" autofocus></textarea><br>
    <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()">Send</button>
    <button class="btn btn-primary" id="savetxt">Save</button>
  </div>
  <section id="content">
    <div id="chathistory" class="card"></div>
  </section>
</main>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

// Formato timestamp con padding
function getFormattedTime() {
  const time = new Date();
  const hour = time.getHours().toString().padStart(2, '0');
  const minute = time.getMinutes().toString().padStart(2, '0');
  return `${hour}:${minute}`;
}

// Traccia gli URL dei Blob per revocarli successivamente
const blobURLs = [];

function trackBlobURL(url) {
  blobURLs.push(url);
}

function revokeAllBlobURLs() {
  blobURLs.forEach(url => URL.revokeObjectURL(url));
  blobURLs.length = 0;
}

// Save Chat Function
var saveButtont = document.getElementById("savetxt");
saveButtont.addEventListener("click", handleSaveButtontClick);

function handleSaveButtontClick() {
  saveChatContentTxt();
}

function saveChatContentTxt() {
  var chatContent = document.getElementById("chathistory").innerText;
  chatContent = chatContent.replace(/Copy/g, "");

  var currentTimestamp = new Date();
  var datetime = currentTimestamp.toISOString();
  var filename = "chatsession_v" + datetime.replace(/[-:.]/g, "");

  var blob = new Blob([chatContent], { type: "text/plain" });
  var url = URL.createObjectURL(blob);

  var downloadLink = document.createElement("a");
  downloadLink.href = url;
  downloadLink.download = filename + ".txt";
  downloadLink.click();
  URL.revokeObjectURL(url);
  
  // Mostra messaggio di conferma
  showSuccessMessage("Chat saved successfully!");
}

function showSuccessMessage(message) {
  const chatContainer = document.getElementById("chathistory");
  const successMsg = document.createElement("div");
  successMsg.className = "success-message";
  successMsg.textContent = message;
  chatContainer.appendChild(successMsg);
  
  // Rimuovi il messaggio dopo 3 secondi
  setTimeout(() => {
    if (successMsg.parentNode) {
      successMsg.parentNode.removeChild(successMsg);
    }
  }, 3000);
}

let chatMemory = [];
chatMemory = createMemory([
  {
    role: "system",
    content: `
    You are a web developer bot. 
    You don't talk, you don't explain your answers. 
    Your only output is made of code to satisfy the received request. 
    You will not explain the code, you will not introduce it, you will not greet or thank the user for the request, you will only produce a well structured production-ready code line by line, without interruptions and without dividing it in sections.
    You will always follow these rules:
    1) Only use internal and inline CSS and Javascript, not separate files;
    2) If you need to use jQuery or Bootstrap, you will insert the link to the latest version CDNs;
    3) if Javascript / Ajax fetches are needed, always use {cache: no-store};
    4) if PHP is used to store any data in JSON files, always use PRETTY PRINT;
    5) always use <meta name="viewport" content="width=device-width, initial-scale=1"> for responsive design and add at least 428px and 834px media queries;
    6) always implement minimal SEO and Accessibility features;
    7) NEVER use shortcuts or dummy functions or snippets like "TO-DO" or "Implement logic here" or such. Code must be functional and production-ready;
    8) when creating multiple-files structures (i.e. complete websites, webapps, SaaS) ALWAYS indicate the filename.ext first, then the code. Each file combo (filename.ext + code) must be separated by a "---------" separator;
    9) always prefer JSON unless DBs explicitly requested for data persistence (CRUD operations);
    10) always use PHP for the backend, producing a single api.php file containing all cases;
    11) always handle errors both in front-end and in back-end with clear feedback / logging;
    `
  }
]);

function createMemory(messages) {
  const memory = [];
  for (const msg of messages) {
    memory.push({ role: msg.role, content: msg.content });
  }
  return memory;
}

async function sendMessage() {
  const apikey = localStorage.getItem("openaikey");
  document.getElementById("apikey").value = apikey;

  if (apikey === "") {
    alert("No OpenAI API Key found.");
  } else {
    const inputElement = document.getElementById("prompt");
    const userInput = inputElement.value.trim();
    if (userInput !== "") {
      // Disabilita il bottone durante la richiesta
      const sendBtn = document.getElementById("sendBtn");
      sendBtn.disabled = true;
      
      showMessage("Guest", userInput, "");
      chatMemory = await getChatGPTResponse(userInput, chatMemory);
      
      // Riabilita il bottone
      sendBtn.disabled = false;
      inputElement.value = "";
    }
  }
}

function copyCodeToClipboard(code) {
  navigator.clipboard.writeText(code).then(() => {
    showSuccessMessage("Code copied to clipboard!");
  }).catch(err => {
    alert("Failed to copy code: " + err);
  });
}

function showMessage(sender, message, tokens, downloadLink, rawCode) {
  const chatContainer = document.getElementById("chathistory");
  const typingIndicator = document.getElementById("typing-indicator");
  const timestamp = getFormattedTime();

  if (typingIndicator && sender === "VivacityGPT") {
    chatContainer.removeChild(typingIndicator);
  }

  const messageElement = document.createElement("div");

  if (sender === "Guest") {
    messageElement.innerHTML = `+[${timestamp}] - ${sender}: ${message}`;
    messageElement.classList.add("user-message");
  } else {

    const iframeContainer = document.createElement("div");
    iframeContainer.className = "iframe-container";
    
    const iframe = document.createElement("iframe");
    iframe.title = "Generated HTML Code Preview";
    
    const blob = new Blob([`
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generated Code</title>
</head>
<body>
${message}
</body>
</html>
`], { type: 'text/html' });

    const url = URL.createObjectURL(blob);
    trackBlobURL(url);
    
    iframe.src = url;
    iframeContainer.appendChild(iframe);
    messageElement.appendChild(iframeContainer);

    const separator = document.createElement("p");
    separator.innerHTML = `${tokens}`;
    messageElement.classList.add("chatgpt-message");
    messageElement.appendChild(separator);

    const actionsDiv = document.createElement("div");
    actionsDiv.className = "flex flex-wrap gap-1";
    actionsDiv.innerHTML = downloadLink;
    
    // Aggiungi bottone Copy Code
    const copyBtn = document.createElement("button");
    copyBtn.classList.add("btn", "btn-secondary");
    copyBtn.textContent = "Copy Code";
    copyBtn.onclick = () => copyCodeToClipboard(rawCode);
    actionsDiv.appendChild(copyBtn);
    
    messageElement.appendChild(actionsDiv);
  }

  chatContainer.appendChild(messageElement);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function getChatGPTResponse(userInput, chatMemory = []) {
  const apikey = localStorage.getItem("openaikey");      
  document.getElementById("apikey").value = apikey;

  if (apikey === "") {
    alert("No OpenAI API Key found.");
    return chatMemory;
  }
  
  const chatContainer = document.getElementById("chathistory");
  const typingIndicator = document.createElement("p");
  typingIndicator.id = "typing-indicator";
  typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
  chatContainer.appendChild(typingIndicator);

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + apikey
      },
      body: JSON.stringify({
        model: "gpt-5-nano",
        messages: [...chatMemory, { role: "user", content: userInput }],
        verbosity: "low",      
      })
    });
    
    if (!response.ok) {
      throw new Error("Error while requesting to the API");
    }
    
    const data = await response.json();
    if (
      !data.choices ||
      !data.choices.length ||
      !data.choices[0].message ||
      !data.choices[0].message.content
    ) {
      throw new Error("Invalid API response");
    }

    const chatGPTResponse = data.choices[0].message.content.trim();
        
    var cleanResponse = chatGPTResponse.replace(
      /(```html|```css|```javascript|```php|```python|```vb|```vb.net|cpp|java|csharp)(.*?)/gs,
      "$2"
    );
    cleanResponse = cleanResponse.replace(/```/g, "");
    cleanResponse = cleanResponse.replace(/\*\*(.*?)\*\*/g, "$1");

    const tokenCount = document.createElement("p");

    if (data.usage.completion_tokens) {
      const requestTokens = data.usage.prompt_tokens;
      const responseTokens = data.usage.completion_tokens;
      const totalTokens = data.usage.total_tokens;      
      const pricepertokenprompt = 0.05/1000000;
      const pricepertokenresponse = 0.40/1000000;             
      const priceperrequest = pricepertokenprompt*requestTokens;
      const priceperresponse = pricepertokenresponse*responseTokens;
      const totalExpense = priceperrequest + priceperresponse;
      tokenCount.innerHTML = `<hr>Your request used ${requestTokens} tokens and costed ${priceperrequest.toFixed(6)}USD<br>This response used ${responseTokens} tokens and costed ${priceperresponse.toFixed(6)}USD<br>Total Tokens: ${totalTokens}. This interaction costed you: ${totalExpense.toFixed(6)}USD.`;
    } else {
      tokenCount.innerHTML = "Unable to track the number of used tokens.";
    }

    const blob = new Blob([cleanResponse], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    trackBlobURL(url);
    const downloadLink = `<a class="btn btn-secondary" href="${url}" download="generated_code.html">Download HTML</a>`;

    showMessage("VivacityGPT", cleanResponse, tokenCount.innerHTML, downloadLink, cleanResponse);

    chatMemory.push({ role: "user", content: userInput });
    chatMemory.push({ role: "assistant", content: cleanResponse });

    return chatMemory;
  } catch (error) {
    // Rimuovi il typing indicator anche in caso di errore
    const typingIndicator = document.getElementById("typing-indicator");
    if (typingIndicator && typingIndicator.parentNode) {
      typingIndicator.parentNode.removeChild(typingIndicator);
    }
    
    alert("An error occurred during the request. Check your OpenAI account or retry later.");
    return chatMemory;
  }
}

// Revoca tutti i Blob URL quando la pagina viene chiusa
window.addEventListener('beforeunload', revokeAllBlobURLs);

</script>
        
<script src="https://code.responsivevoice.org/responsivevoice.js?key=yZtZhFyg">
  var selectedText = window.getSelection().toString();
  responsiveVoice.speak(selectedText, "UK English Male", {rate: 1.5});
</script>

</body>
</html>
