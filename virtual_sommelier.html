<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VivacityGPT Complete - AI Virtual Sommelier</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI Virtual Sommelier</h1>

  <section class="userinput">
    <textarea id="user-input" placeholder="Enter message..." rows="4"></textarea>
    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  </section>

  <section class="chathistory">
    <div id="chat-container"></div>
  </section>
</main>

<script>
function createMemory(messages) {
    const memory = [];
    for (const msg of messages) {
        memory.push({ role: msg.role, content: msg.content });
    }
    return memory;
}

async function sendMessage() {
    const inputElement = document.getElementById('user-input');
    const userInput = inputElement.value.trim();
    if (userInput !== '') {
        showMessage("Guest", userInput);
        chatMemory = await getChatGPTResponse(userInput, chatMemory);
        inputElement.value = '';
    }
}

function showMessage(sender, message) {
    const chatContainer = document.getElementById('chat-container');
    const chatSection = document.querySelector('.chathistory');
    const typingIndicator = document.getElementById('typing-indicator');
    if (typingIndicator && sender === 'GPT') {
        chatContainer.removeChild(typingIndicator);
    }
    const messageElement = document.createElement('div');
    messageElement.innerHTML = `${sender}: ${message}`;
    if (sender === 'Guest') {
        messageElement.classList.add('user-message');
    } else if (sender === 'GPT') {
        messageElement.classList.add('chatgpt-message');
        const copyLink = document.createElement('button');
        copyLink.innerText = 'Copy';
        copyLink.className = 'btn btn-secondary';
        copyLink.style.float = 'right';
        copyLink.addEventListener('click', function (event) {
            event.preventDefault();
            const text = message;
            const input = document.createElement('input');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
        });
        messageElement.appendChild(copyLink);
    }
    chatContainer.appendChild(messageElement);
    chatSection.scrollTop = chatSection.scrollHeight;
}

async function getChatGPTResponse(userInput, chatMemory = []) {
    const chatContainer = document.getElementById('chat-container');
    const apikey = localStorage.getItem("openaikey");
    console.log(apikey);
    if (apikey === "") {
      alert("No OpenAI API Key found.");
      return;
    }
    const typingIndicator = document.createElement('p');
    typingIndicator.id = 'typing-indicator';
    typingIndicator.textContent = 'Thinking...';
    chatContainer.appendChild(typingIndicator);
    try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + apikey
            },
            body: JSON.stringify({
                "model": "gpt-4.1-nano",
                "messages": [
                    ...chatMemory,
                    {"role": "user", "content": userInput}
                ]
            })
        });
        if (!response.ok) {
            throw new Error('Error in the request to API');
        }
        const data = await response.json();
        if (!data.choices || !data.choices.length || !data.choices[0].message || !data.choices[0].message.content) {
            throw new Error('Invalid API request');
        }
        const chatGPTResponse = data.choices[0].message.content.trim();
        let cleanResponse = chatGPTResponse.replace(/(?:html|css|js|php|python|script)?[\s\S]*?/g, '');
        console.log(cleanResponse);
        const formattedResponse = convertToHTML(cleanResponse);
        showMessage("GPT", formattedResponse);
        chatMemory.push({ role: 'user', content: userInput });
        chatMemory.push({ role: 'assistant', content: formattedResponse });
        return chatMemory;
    } catch (error) {
        console.error(error);
    }
}

function convertToHTML(text) {
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    const lines = text.split('\n');
    let htmlLines = [];
    let inList = false;
    for (let line of lines) {
        const listItemMatch = /^\s*-\s+(.+)/.exec(line);
        if (listItemMatch) {
            if (!inList) {
                inList = true;
                htmlLines.push('<ul>');
            }
            htmlLines.push('<li>' + listItemMatch[1] + '</li>');
        } else {
            if (inList) {
                htmlLines.push('</ul>');
                inList = false;
            }
            htmlLines.push(line);
        }
    }
    if (inList) {
        htmlLines.push('</ul>');
        inList = false;
    }
    var htmlText = htmlLines.join('\n');
    htmlText = htmlText.replace(/\n/g, '<br>');
    return htmlText;
}

function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

let chatMemory = createMemory([
    { role: 'system', content: `Sei un esperto sommelier incaricato di consigliare abbinamenti tra vini e cibo, con particolare attenzione alla cucina italiana.

1. Principi di base dell'abbinamento:
- Abbinamento per contrasto: combina sapori opposti, come vino dolce con piatto salato.
- Abbinamento per similitudine: allinea le caratteristiche del vino con quelle del cibo.
- Regola del rosso con carne e piatti saporiti; bianco con pesce, verdure e piatti leggeri.

2. Caratteristiche dei vini italiani:
- Vini secco, fresco, con buona acidità per piatti leggeri e verdure.
- Vini corposi, tannici e strutturati per carni rosse e formaggi stagionati.

3. Consigli aggiuntivi:
- Adegua la temperatura di servizio.
- Considera acidità e sapidità del piatto.
- Ricorda che il gusto personale è importante.

4. Se l'utente ti chiede indicazioni su un piatto o su un vino specifici, fornisci una sincera valutazione dei migliori abbinamenti, e proponine almeno 2.` }
]);
</script>
</body>
</html>
