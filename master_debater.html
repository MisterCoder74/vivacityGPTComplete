<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>AI Master Debater</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Master Debater - Watch two AI personalities debate any topic">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI Master Debater</h1>

  <div class="controls">
    <div class="control-row">
      <div class="control-group">
        <label for="debateTopic">Debate Topic:</label>
        <textarea id="debateTopic" rows="3" placeholder="Enter the topic to debate (e.g., 'Is artificial intelligence a threat to humanity?')"></textarea>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group">
        <label for="personality1">Debater 1 Personality:</label>
        <select id="personality1">
          <option value="">Select personality...</option>
          <option value="philosopher">Philosopher</option>
          <option value="scientist">Scientist</option>
          <option value="politician">Politician</option>
          <option value="entrepreneur">Entrepreneur</option>
          <option value="activist">Activist</option>
          <option value="comedian">Comedian</option>
          <option value="lawyer">Lawyer</option>
          <option value="artist">Artist</option>
        </select>
      </div>

      <div class="control-group">
        <label for="personality2">Debater 2 Personality:</label>
        <select id="personality2">
          <option value="">Select personality...</option>
          <option value="philosopher">Philosopher</option>
          <option value="scientist">Scientist</option>
          <option value="politician">Politician</option>
          <option value="entrepreneur">Entrepreneur</option>
          <option value="activist">Activist</option>
          <option value="comedian">Comedian</option>
          <option value="lawyer">Lawyer</option>
          <option value="artist">Artist</option>
        </select>
      </div>
    </div>

    <div class="button-group">
      <button id="startBtn" class="btn btn-primary">
        <span class="material-symbols-outlined">play_arrow</span>
        START DEBATE
      </button>
      <button id="stopBtn" class="btn btn-secondary" disabled>
        <span class="material-symbols-outlined">stop</span>
        STOP
      </button>
      <button id="saveBtn" class="btn btn-secondary" disabled>
        <span class="material-symbols-outlined">save</span>
        SAVE LOG
      </button>
    </div>
  </div>

  <div id="timer" class="timer" style="display: none;">
    Time: <span id="timeLeft">60</span>s
  </div>

  <div id="status" class="status" style="display: none;"></div>

  <div class="chatbots-container">
    <div class="chatbot-wrapper">
      <div class="chatbot-header bot1">Debater 1: <span id="debater1Name">-</span></div>
      <div class="chatbox" id="chatbox1"></div>
    </div>

    <div class="chatbot-wrapper">
      <div class="chatbot-header bot2">Debater 2: <span id="debater2Name">-</span></div>
      <div class="chatbox" id="chatbox2"></div>
    </div>
  </div>

  <div id="votingSection" class="voting-section">
    <h2>Who won the debate?</h2>
    <p style="color: #666; margin: 10px 0;">Cast your vote for the most convincing debater:</p>
    <div class="vote-buttons">
      <button class="vote-btn debater1 btn btn-primary" id="voteBtn1">
        Vote for <span id="voteName1">Debater 1</span>
      </button>
      <button class="vote-btn debater2 btn btn-primary" id="voteBtn2">
        Vote for <span id="voteName2">Debater 2</span>
      </button>
    </div>
  </div>
</main>

<script>
const PERSONALITIES = {
  philosopher: { name: "Philosopher", prompt: "You are a philosophical debater..." },
  scientist: { name: "Scientist", prompt: "You are a scientific debater..." },
  politician: { name: "Politician", prompt: "You are a political debater..." },
  entrepreneur: { name: "Entrepreneur", prompt: "You are an entrepreneurial debater..." },
  activist: { name: "Activist", prompt: "You are a passionate activist debater..." },
  comedian: { name: "Comedian", prompt: "You are a comedic debater..." },
  lawyer: { name: "Lawyer", prompt: "You are a legal debater..." },
  artist: { name: "Artist", prompt: "You are an artistic debater..." }
};

const API_KEY = localStorage.getItem("openaikey");
if (!API_KEY) {
  alert("No OpenAI API Key found in localStorage.");
}

let conversationHistory1 = [];
let conversationHistory2 = [];
let isRunning = false;
let currentTurn = 1;
let debateStartTime = null;
let debateTimeLimit = 60000;
let timerInterval = null;
let debateLog = [];
let winnerVote = null;

const chatbox1 = document.getElementById('chatbox1');
const chatbox2 = document.getElementById('chatbox2');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const saveBtn = document.getElementById('saveBtn');
const debateTopic = document.getElementById('debateTopic');
const personality1 = document.getElementById('personality1');
const personality2 = document.getElementById('personality2');
const status = document.getElementById('status');
const timer = document.getElementById('timer');
const timeLeft = document.getElementById('timeLeft');
const debater1Name = document.getElementById('debater1Name');
const debater2Name = document.getElementById('debater2Name');
const votingSection = document.getElementById('votingSection');

function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

function showStatus(message) {
  status.textContent = message;
  status.style.display = 'block';
}

function hideStatus() {
  status.style.display = 'none';
}

function addMessage(chatbox, message, className) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${className}`;
  messageDiv.textContent = message;
  chatbox.appendChild(messageDiv);
  chatbox.scrollTop = chatbox.scrollHeight;
}

startBtn.addEventListener('click', () => {
  const topic = debateTopic.value.trim();
  const p1 = personality1.value;
  const p2 = personality2.value;
  if (!topic) {
    alert('Please enter a debate topic!');
    return;
  }
  if (!p1 || !p2) {
    alert('Please select personalities for both debaters!');
    return;
  }
  chatbox1.innerHTML = '';
  chatbox2.innerHTML = '';
  conversationHistory1 = [];
  conversationHistory2 = [];
  currentTurn = 1;
  debateLog = [];
  winnerVote = null;
  debater1Name.textContent = PERSONALITIES[p1].name;
  debater2Name.textContent = PERSONALITIES[p2].name;
  votingSection.style.display = 'none';
  isRunning = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  saveBtn.disabled = true;
  showStatus('Debate starting...');
});

stopBtn.addEventListener('click', () => {
  isRunning = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  saveBtn.disabled = false;
  showStatus('Debate stopped!');
});

saveBtn.addEventListener('click', () => {
  if (debateLog.length === 0) {
    alert('No debate to save!');
    return;
  }
  let logText = 'AI MASTER DEBATER - DEBATE LOG\n\n';
  logText += `Date: ${new Date().toLocaleString('en-US')}\n`;
  logText += `Topic: ${debateTopic.value}\n\n`;
  logText += `Debater 1: ${PERSONALITIES[personality1.value].name}\n`;
  logText += `Debater 2: ${PERSONALITIES[personality2.value].name}\n\n`;
  if (winnerVote) {
    logText += `WINNER (User Vote): ${winnerVote}\n\n`;
  }
  logText += 'DEBATE TRANSCRIPT\n\n';
  debateLog.forEach((entry, index) => {
    logText += `[${index + 1}] ${entry.speaker}:\n${entry.message}\n\n`;
  });
  const blob = new Blob([logText], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const timestamp = new Date().getTime();
  const topicShort = debateTopic.value.substring(0, 30).replace(/[^a-z0-9]/gi, '_');
  a.download = `debate_${topicShort}_${timestamp}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
