    <style>

            background: rgba(255, 255, 255, 0.25);

        .control-row {
            display: flex;

            margin-bottom: 15px;

        .control-group {
            flex: 1;

        .control-group label {

        .control-group textarea,

        .chatbot-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            text-align: center;
        }
        
        .chatbot-header.bot1 {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);

        .chatbot-header.bot2 {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
        }
        
        .chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 90%;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.from-bot1 {
            background: #ffe0e0;
            margin-left: 0;
            border-left: 4px solid #FF6B6B;
        }
        
        .message.from-bot2 {
            background: #e0f7f4;
            margin-right: 0;
            margin-left: auto;
            border-right: 4px solid #4ECDC4;
        }
        
        .message.thinking {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            font-style: italic;
            color: #856404;
        }

        .message.conclusion {
            background: #e8f5e9;
            border: 3px solid #4CAF50;
            font-weight: bold;
            font-size: 15px;
        }
        
        .status {
            text-align: center;
            padding: 12px;
            background: #e3f2fd;

        }

        .timer {
            text-align: center;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;

        }

        .voting-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);

        }

        .voting-section h2 {

        }

        .vote-buttons {
            display: flex;
            gap: 20px;

        .vote-btn {
            padding: 15px 30px;
            font-size: 16px;

            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .vote-btn.debater1 {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            color: white;
        }

        .vote-btn.debater2 {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
            color: white;
        }

        .vote-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        @media (max-width: 768px) {
            .chatbots-container {
                grid-template-columns: 1fr;
            }
            
            .chatbot-wrapper {
                height: 400px;
            }

            .control-row {
                flex-direction: column;
            }
        }
            
        @media screen and (max-width: 600px) {
            .topnav a:not(:first-child) {display: none;}
            .topnav a.icon {
                float: right;
                display: block;
            }
        }

        @media screen and (max-width: 900px) {
            .topnav.responsive {position: relative;}
            .topnav.responsive .icon {
                position: absolute;
                right: 0;
                top: 0;
            }
            .topnav.responsive a {
                float: none;
                display: block;
                text-align: left;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Master Debater</h1>
    </header>    

    <div class="container">
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="debateTopic">Debate Topic:</label>
                    <textarea id="debateTopic" rows="3" placeholder="Enter the topic to debate (e.g., 'Is artificial intelligence a threat to humanity?')"></textarea>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="personality1">Debater 1 Personality:</label>
                    <select id="personality1">
                        <option value="">Select personality...</option>
                        <option value="philosopher">Philosopher</option>
                        <option value="scientist">Scientist</option>
                        <option value="politician">Politician</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="activist">Activist</option>
                        <option value="comedian">Comedian</option>
                        <option value="lawyer">Lawyer</option>
                        <option value="artist">Artist</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="personality2">Debater 2 Personality:</label>
                    <select id="personality2">
                        <option value="">Select personality...</option>
                        <option value="philosopher">Philosopher</option>
                        <option value="scientist">Scientist</option>
                        <option value="politician">Politician</option>
                        <option value="entrepreneur">Entrepreneur</option>
                        <option value="activist">Activist</option>
                        <option value="comedian">Comedian</option>
                        <option value="lawyer">Lawyer</option>
                        <option value="artist">Artist</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button id="startBtn">
                    <span class="material-symbols-outlined">play_arrow</span>
                    START DEBATE
                </button>
                <button id="stopBtn" disabled>
                    <span class="material-symbols-outlined">stop</span>
                    STOP
                </button>
                <button id="saveBtn" disabled>
                    <span class="material-symbols-outlined">save</span>
                    SAVE LOG
                </button>
            </div>
        </div>
        
        <div id="timer" class="timer" style="display: none;">
            Time: <span id="timeLeft">60</span>s
        </div>
        
        <div id="status" class="status" style="display: none;"></div>
        
        <div class="chatbots-container">
            <div class="chatbot-wrapper">
                <div class="chatbot-header bot1">🎯 Debater 1: <span id="debater1Name">-</span></div>
                <div class="chatbox" id="chatbox1"></div>
            </div>
            
            <div class="chatbot-wrapper">
                <div class="chatbot-header bot2">🎯 Debater 2: <span id="debater2Name">-</span></div>
                <div class="chatbox" id="chatbox2"></div>
            </div>
        </div>

        <div id="votingSection" class="voting-section">
            <h2>🏆 Who won the debate? 🏆</h2>
            <p style="color: #666; margin: 10px 0;">Cast your vote for the most convincing debater:</p>
            <div class="vote-buttons">
                <button class="vote-btn debater1" id="voteBtn1">
                    Vote for <span id="voteName1">Debater 1</span>
                </button>
                <button class="vote-btn debater2" id="voteBtn2">
                    Vote for <span id="voteName2">Debater 2</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Personality system prompts dictionary
        const PERSONALITIES = {
            philosopher: {
                name: "Philosopher",
                prompt: `You are a philosophical debater who approaches topics through deep reasoning, logic, and ethical considerations. You reference great thinkers, use Socratic questioning, explore fundamental principles, and examine moral implications. You speak thoughtfully, question assumptions, and seek deeper truths. Keep responses concise (max 100 words) and engaging. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            scientist: {
                name: "Scientist",
                prompt: `You are a scientific debater who relies on empirical evidence, data, research studies, and the scientific method. You cite studies, use statistics, demand reproducible evidence, and apply logical reasoning. You remain objective, fact-based, and methodical. Keep responses concise (max 100 words) and evidence-driven. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            politician: {
                name: "Politician",
                prompt: `You are a political debater skilled in rhetoric, public policy, and persuasion. You appeal to common values, use powerful rhetoric, reference policy implications, and connect issues to public welfare. You're charismatic, strategic, and know how to win hearts and minds. Keep responses concise (max 100 words) and persuasive. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            entrepreneur: {
                name: "Entrepreneur",
                prompt: `You are an entrepreneurial debater focused on innovation, practicality, market dynamics, and real-world impact. You think about scalability, ROI, market needs, and disruptive solutions. You're pragmatic, action-oriented, and results-driven. Keep responses concise (max 100 words) and business-focused. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            activist: {
                name: "Activist",
                prompt: `You are a passionate liberal democratic politically left-winged activist debater fighting for social justice, equity, and systemic change. You highlight injustices, amplify marginalized voices, demand accountability, and call to action. You're emotionally compelling, morally driven, and uncompromising in your values. Keep responses concise (max 100 words) and powerful. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            comedian: {
                name: "Comedian",
                prompt: `You are a comedic debater who uses humor, wit, satire, and clever observations to make points. You find absurdity in serious topics, use analogies and wordplay, and make people think while they laugh. You're sharp, entertaining, and surprisingly insightful. Keep responses concise (max 100 words) and funny. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            lawyer: {
                name: "Lawyer",
                prompt: `You are a legal debater trained in argumentation, precedent, and logical rigor. You construct airtight arguments, cite relevant cases and laws, identify logical fallacies, and cross-examine opposing views. You're analytical, precise, and commanding. Keep responses concise (max 100 words) and legally sound. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            },
            artist: {
                name: "Artist",
                prompt: `You are an artistic debater who sees issues through creative, emotional, and aesthetic lenses. You use metaphors, appeal to human experience, explore beauty and meaning, and challenge conventional thinking. You're intuitive, expressive, and deeply human. Keep responses concise (max 100 words) and evocative. Your aim is not to reach an agreement with your debater, yet to express your idea clearly and freely. Feel free to present opposing ideas if you think different.`
            }
        };

        const API_KEY = localStorage.getItem("openaikey");
        
        if (!API_KEY) {
            alert("No OpenAI API Key found in localStorage.");
        }

        let conversationHistory1 = [];
        let conversationHistory2 = [];
        let isRunning = false;
        let currentTurn = 1;
        let debateStartTime = null;
        let debateTimeLimit = 60000;
        let timerInterval = null;
        let debateLog = [];
        let winnerVote = null;
        
        const chatbox1 = document.getElementById('chatbox1');
        const chatbox2 = document.getElementById('chatbox2');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const debateTopic = document.getElementById('debateTopic');
        const personality1 = document.getElementById('personality1');
        const personality2 = document.getElementById('personality2');
        const status = document.getElementById('status');
        const timer = document.getElementById('timer');
        const timeLeft = document.getElementById('timeLeft');
        const debater1Name = document.getElementById('debater1Name');
        const debater2Name = document.getElementById('debater2Name');
        const votingSection = document.getElementById('votingSection');
        const voteBtn1 = document.getElementById('voteBtn1');
        const voteBtn2 = document.getElementById('voteBtn2');
        const voteName1 = document.getElementById('voteName1');
        const voteName2 = document.getElementById('voteName2');
            
        function myFunction() {
            var x = document.getElementById("myTopnav");
            if (x.className === "topnav") {
                x.className += " responsive";
            } else {
                x.className = "topnav";
            }
        }    
        
        function showStatus(message) {
            status.textContent = message;
            status.style.display = 'block';
        }
        
        function hideStatus() {
            status.style.display = 'none';
        }

        function startTimer() {
            debateStartTime = Date.now();
            timer.style.display = 'block';
            
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - debateStartTime;
                const remaining = Math.max(0, Math.ceil((debateTimeLimit - elapsed) / 1000));
                timeLeft.textContent = remaining;
                
                if (remaining === 0) {
                    stopDebate(true);
                }
            }, 100);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function addMessage(chatbox, message, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = message;
            chatbox.appendChild(messageDiv);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function addToLog(speaker, message) {
            debateLog.push({
                speaker: speaker,
                message: message,
                timestamp: new Date().toISOString()
            });
        }
        
        async function generateResponse(personality, conversationHistory, userMessage, isConclusion = false) {
            const API_URL = "https://api.openai.com/v1/chat/completions";
            
            let systemPrompt = personality;
            if (isConclusion) {
                systemPrompt += "\n\nIMPORTANT: This is your FINAL CONCLUSION. Summarize your key arguments in 2-3 sentences and make a powerful closing statement. Start with 'IN CONCLUSION:'";
            }
            
            const messages = [
                {role: "system", content: systemPrompt},
                ...conversationHistory,
                {role: "user", content: userMessage}
            ];
            
            const requestOptions = {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: messages,
                    max_tokens: 250
                })
            };
            
            try {
                const response = await fetch(API_URL, requestOptions);
                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (error) {
                console.error('Error:', error);
                return "Error generating response.";
            }
        }

        async function requestConclusions() {
            showStatus('⏰ Time up! Requesting final conclusions...');
            
            addMessage(chatbox1, 'Preparing conclusion...', 'thinking');
            const conclusion1 = await generateResponse(
                PERSONALITIES[personality1.value].prompt,
                conversationHistory1,
                "The debate time is up. Present your final conclusion.",
                true
            );
            const thinkingMsg1 = chatbox1.querySelector('.thinking');
            if (thinkingMsg1) thinkingMsg1.remove();
            addMessage(chatbox1, conclusion1, 'from-bot1 conclusion');
            addToLog(PERSONALITIES[personality1.value].name, conclusion1);
            
            addMessage(chatbox2, 'Preparing conclusion...', 'thinking');
            const conclusion2 = await generateResponse(
                PERSONALITIES[personality2.value].prompt,
                conversationHistory2,
                "The debate time is up. Present your final conclusion.",
                true
            );
            const thinkingMsg2 = chatbox2.querySelector('.thinking');
            if (thinkingMsg2) thinkingMsg2.remove();
            addMessage(chatbox2, conclusion2, 'from-bot2 conclusion');
            addToLog(PERSONALITIES[personality2.value].name, conclusion2);
            
            showVoting();
        }

        function showVoting() {
            hideStatus();
            votingSection.style.display = 'block';
            voteName1.textContent = PERSONALITIES[personality1.value].name;
            voteName2.textContent = PERSONALITIES[personality2.value].name;
            saveBtn.disabled = false;
        }
        
        async function conversationLoop(initialTopic) {
            startTimer();
            
            let currentMessage = `Debate topic: "${initialTopic}". Present your opening argument.`;
            
            addMessage(chatbox1, `Topic: ${initialTopic}`, 'from-bot1');
            addMessage(chatbox2, `Topic: ${initialTopic}`, 'from-bot2');
            addToLog('MODERATOR', `Topic: ${initialTopic}`);
            
            while (isRunning) {
                const elapsed = Date.now() - debateStartTime;
                if (elapsed >= debateTimeLimit) {
                    break;
                }
                
                if (currentTurn === 1) {
                    showStatus(`${PERSONALITIES[personality1.value].name} is speaking...`);
                    addMessage(chatbox1, 'Thinking...', 'thinking');
                    
                    const response1 = await generateResponse(
                        PERSONALITIES[personality1.value].prompt,
                        conversationHistory1,
                        currentMessage
                    );
                    
                    if (!isRunning) break;
                    
                    const thinkingMsg = chatbox1.querySelector('.thinking');
                    if (thinkingMsg) thinkingMsg.remove();
                    
                    addMessage(chatbox1, response1, 'from-bot1');
                    addToLog(PERSONALITIES[personality1.value].name, response1);
                    conversationHistory1.push({role: "user", content: currentMessage});
                    conversationHistory1.push({role: "assistant", content: response1});
                    
                    currentMessage = response1;
                    currentTurn = 2;
                    
                } else {
                    showStatus(`${PERSONALITIES[personality2.value].name} is responding...`);
                    addMessage(chatbox2, 'Thinking...', 'thinking');
                    
                    const response2 = await generateResponse(
                        PERSONALITIES[personality2.value].prompt,
                        conversationHistory2,
                        currentMessage
                    );
                    
                    if (!isRunning) break;
                    
                    const thinkingMsg = chatbox2.querySelector('.thinking');
                    if (thinkingMsg) thinkingMsg.remove();
                    
                    addMessage(chatbox2, response2, 'from-bot2');
                    addToLog(PERSONALITIES[personality2.value].name, response2);
                    conversationHistory2.push({role: "user", content: currentMessage});
                    conversationHistory2.push({role: "assistant", content: response2});
                    
                    currentMessage = response2;
                    currentTurn = 1;
                }
                
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            stopTimer();
            await requestConclusions();
        }

        function stopDebate(timeExpired = false) {
            isRunning = false;
            stopTimer();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            debateTopic.disabled = false;
            personality1.disabled = false;
            personality2.disabled = false;
            
            if (timeExpired) {
                // Conclusions will be requested automatically
            } else {
                showStatus('Debate stopped by user!');
                setTimeout(hideStatus, 2000);
            }
        }
        
        startBtn.addEventListener('click', () => {
            const topic = debateTopic.value.trim();
            const p1 = personality1.value;
            const p2 = personality2.value;
            
            if (!topic) {
                alert('Please enter a debate topic!');
                return;
            }
            
            if (!p1 || !p2) {
                alert('Please select personalities for both debaters!');
                return;
            }

            if (p1 === p2) {
                const confirm = window.confirm('Both debaters have the same personality. This may lead to less diverse arguments. Continue anyway?');
                if (!confirm) return;
            }
            
            chatbox1.innerHTML = '';
            chatbox2.innerHTML = '';
            conversationHistory1 = [];
            conversationHistory2 = [];
            currentTurn = 1;
            debateLog = [];
            winnerVote = null;
            
            debater1Name.textContent = PERSONALITIES[p1].name;
            debater2Name.textContent = PERSONALITIES[p2].name;
            
            votingSection.style.display = 'none';
            voteBtn1.disabled = false;
            voteBtn2.disabled = false;
            voteBtn1.style.transform = '';
            voteBtn1.style.boxShadow = '';
            voteBtn1.style.opacity = '';
            voteBtn2.style.transform = '';
            voteBtn2.style.boxShadow = '';
            voteBtn2.style.opacity = '';
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            saveBtn.disabled = true;
            debateTopic.disabled = true;
            personality1.disabled = true;
            personality2.disabled = true;
            
            showStatus('🎭 Debate starting...');
            conversationLoop(topic);
        });
        
        stopBtn.addEventListener('click', () => {
            stopDebate(false);
        });

        voteBtn1.addEventListener('click', () => {
            winnerVote = PERSONALITIES[personality1.value].name;
            voteBtn1.style.transform = 'scale(1.2)';
            voteBtn1.style.boxShadow = '0 0 20px rgba(255, 107, 107, 0.8)';
            voteBtn2.style.opacity = '0.5';
            showStatus(`🏆 You voted for ${winnerVote}!`);
            setTimeout(() => {
                voteBtn1.disabled = true;
                voteBtn2.disabled = true;
            }, 500);
        });

        voteBtn2.addEventListener('click', () => {
            winnerVote = PERSONALITIES[personality2.value].name;
            voteBtn2.style.transform = 'scale(1.2)';
            voteBtn2.style.boxShadow = '0 0 20px rgba(78, 205, 196, 0.8)';
            voteBtn1.style.opacity = '0.5';
            showStatus(`🏆 You voted for ${winnerVote}!`);
            setTimeout(() => {
                voteBtn1.disabled = true;
                voteBtn2.disabled = true;
            }, 500);
        });
        
        saveBtn.addEventListener('click', () => {
            if (debateLog.length === 0) {
                alert('No debate to save!');
                return;
            }
            
            let logText = '═══════════════════════════════════════════════\n';
            logText += '          AI MASTER DEBATER - DEBATE LOG\n';
            logText += '═══════════════════════════════════════════════\n\n';
            logText += `Date: ${new Date().toLocaleString('en-US')}\n`;
            logText += `Topic: ${debateTopic.value}\n\n`;
            logText += `Debater 1: ${PERSONALITIES[personality1.value].name}\n`;
            logText += `Debater 2: ${PERSONALITIES[personality2.value].name}\n\n`;
            
            if (winnerVote) {
                logText += `🏆 WINNER (User Vote): ${winnerVote}\n\n`;
            } else {
                logText += `⚠️ No vote cast\n\n`;
            }
            
            logText += '═══════════════════════════════════════════════\n';
            logText += '              DEBATE TRANSCRIPT\n';
            logText += '═══════════════════════════════════════════════\n\n';
            
            debateLog.forEach((entry, index) => {
                logText += `[${index + 1}] ${entry.speaker}:\n`;
                logText += `${entry.message}\n\n`;
                logText += '───────────────────────────────────────────────\n\n';
            });
            
            logText += '═══════════════════════════════════════════════\n';
            logText += '                  END OF DEBATE\n';
            logText += '═══════════════════════════════════════════════\n';
            
            const blob = new Blob([logText], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const timestamp = new Date().getTime();
            const topicShort = debateTopic.value.substring(0, 30).replace(/[^a-z0-9]/gi, '_');
            a.download = `debate_${topicShort}_${timestamp}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus('💾 Debate log saved successfully!');
            setTimeout(hideStatus, 3000);
        });
    </script>
</body>
</html>
