<!DOCTYPE html>
<html>
<head>
<title>VivacityGPT Complete - Image Creator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
/* ——— Stili originali mantenuti ——— */
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
height:100vh;width:100%;
background-color:white;
background-image:url('vd_background.jpg');
background-position:center;
background-size:cover;
}
.topnav{overflow:hidden;background-color:#000;z-index:100;}
.topnav a{float:left;display:block;color:#fff;text-align:center;padding:14px 16px;text-decoration:none;font-size:17px;}
.topnav a:hover{background-color:rgba(4,190,109,1);color:black;}
.topnav a.active{background-color:rgba(4,190,109,1);color:white;}
.topnav .icon{display:none;}
.heading{font-size:2.4rem;color:black;text-shadow:0 2px 8px rgba(4,190,109,1);backdrop-filter:blur(4px);}
hr{background:transparent;height:4px;border:1px solid black inset;}
main{margin:1rem auto;width:80%;height:auto;text-align:center;padding:1rem;border-radius:24px;box-shadow:0 6px 10px black;}
.userinput{width:100%;backdrop-filter:blur(4px);}
#apikey{width:60%;margin:0.5rem;border-radius:10px;padding:4px 8px;}
#prompt,#search-input{width:80%;margin:0.5rem;resize:none;border-radius:6px;padding:4px 8px;}
button{padding:0.5rem 1rem;border-radius:10px;cursor:pointer;margin-top:4px;background:rgba(4,190,109,1);color:#fff;transition:all .3s ease;}
button:hover{background:transparent;color:rgba(4,190,109,1);border:2px solid rgba(4,190,109,1);}
select{padding:0.5rem 1rem;border-radius:10px;cursor:pointer;margin-top:4px;}
.user-message{background-color:rgba(4,190,109,.7);padding:8px;width:70%;align-self:start;text-align:left;border:1px solid black;color:black;font-size:.9rem;border-radius:6px;margin-bottom:4px;line-height:1.5;}
.chatgpt-messageIMG{background-color:transparent;padding:8px;width:auto;align-self:start;text-align:justify;color:black;font-size:.9rem;border:1px solid black;box-shadow:0 4px 8px black;border-radius:6px;margin-bottom:10px;display:flex;flex-direction:column;align-items:start;line-height:1.5;backdrop-filter:blur(4px);}
#chat-containerIMG{margin-top:.5rem;display:flex;flex-direction:column;height:70vh;width:100%;overflow-y:auto;padding:4px;font-family:"Spectral",serif;}
img{max-width:512px;height:auto;}
.preloader {width: 48px;}  
        
@media screen and (max-width: 600px) {
.topnav a:not(:first-child) {display: none;}
.topnav a.icon {
float: right;
display: block;
}
main {
margin: 10px auto;
width: 80%;
height: auto;
text-align: center;
padding: .5rem;
border-radius: 24px;
box-shadow: 0 6px 10px black;
}
.preloader {
width: 28px;
}
#chat-containerIMG {
margin-top: .5rem;
display: flex;
flex-direction: column;
height: 70vh;
border: 1px solid black;
width: 95%;
overflow-y: auto;
padding: 4px;
font-family: "Spectral", serif;
}

.generatedimg {
max-width: 320px
height: auto;
}

}

@media screen and (max-width: 900px) {
.topnav.responsive {position: relative;}
.topnav.responsive .icon {
position: absolute;
right: 0;
top: 0;
}
.topnav.responsive a {
float: none;
display: block;
text-align: left;
}
main {
margin: 10px auto;
width: 80%;
text-align: center;
padding: 1rem;
border-radius: 24px;
box-shadow: 0 6px 10px black;
}
.preloader {
width: 36px;
}
}        
</style>
</head>
<body>

<div class="topnav" id="myTopnav">
<a href="index.html">Home</a>
<a href="txtchatbot.html">Master Chatbot</a>
<a href="devbot.html">Web Dev Bot</a>
<a href="#" class="active">Image Creator</a>
<a href="pdfchatbot.html">PDF Chatbot</a>
<a href="tts.html">Text to Speech</a>
<a href="whisper.html">Audio Transcriber</a>
<a href="vd_gpts.html">VD GPTs</a>
<a href="script:void(0);" class="icon" onclick="myFunction()">
<i class="fa fa-bars"></i>
</a>
</div>

<main>
<h1 class="heading">OpenAI Image Generation</h1>
<hr>

<div class="userinput">
<input type="password" id="apikey" placeholder="Your API Key" readonly>
<textarea rows="6" id="prompt" placeholder="Your prompt"></textarea><br>

<!-- Selezioni aggiunte -->
<label>Model:</label>
<select id="modelSelect">
<option value="gpt-image-1-mini" selected>gpt-image-1-mini</option>
<option value="gpt-image-1">gpt-image-1</option>
<option value="gpt-image-1.5">gpt-image-1.5</option>
</select>

<label>Size:</label>
<select id="sizeSelect">
<option value="1024x1024" selected>1024x1024 (square)</option>
<option value="1536x1024">1536x1024 (landscape)</option>
<option value="1024x1536">1024x1536 (portrait)</option>
</select>

<label>Quality:</label>
<select id="qualitySelect">
<option value="low">low</option>
<option value="medium" selected>medium</option>
<option value="high">high</option>
</select>
<br><br>

<!-- Pulsanti preimpostati -->
<div>
<button type="button" onclick="applyPreset('ultra')">Ultra Quality</button>
<button type="button" onclick="applyPreset('optimized')">Optimized</button>
<button type="button" onclick="applyPreset('cheap')">Extra Cheap</button>
</div>
<br>

<button onclick="generateImage()">Send</button>
</div>

<section class="history">
<div id="chat-containerIMG" class="chathistory"></div>
</section>
</main>

<script>
function myFunction() {
var x = document.getElementById("myTopnav");
if (x.className === "topnav") x.className += " responsive";
else x.className = "topnav";
}

// Funzione per applicare preset
function applyPreset(type) {
const modelSel = document.getElementById("modelSelect");
const sizeSel = document.getElementById("sizeSelect");
const qualitySel = document.getElementById("qualitySelect");

if (type === "ultra") {
modelSel.value = "gpt-image-1.5";
sizeSel.value = "1024x1024";
qualitySel.value = "high";
} else if (type === "optimized") {
modelSel.value = "gpt-image-1";
sizeSel.value = "1024x1024";
qualitySel.value = "medium";
} else if (type === "cheap") {
modelSel.value = "gpt-image-1-mini";
sizeSel.value = "1024x1024";
qualitySel.value = "low";
}
}

async function generateImage() {
const apikey = localStorage.getItem("openaikey");
document.getElementById("apikey").value = apikey;

const prompt = document.getElementById("prompt").value;
const model = document.getElementById("modelSelect").value;
const size = document.getElementById("sizeSelect").value;
const quality = document.getElementById("qualitySelect").value;

const chatContainer = document.getElementById("chat-containerIMG");

const promptDiv = document.createElement("div");
promptDiv.classList.add("user-message");
promptDiv.textContent = `Prompt: ${prompt}`;
chatContainer.appendChild(promptDiv);

const typingIndicator = document.createElement("p");
typingIndicator.id = "typing-indicatorIMG";
typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
chatContainer.appendChild(typingIndicator);

try {
const response = await fetch("https://api.openai.com/v1/images/generations", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + apikey
},
body: JSON.stringify({
prompt: prompt + " MANDATORY: make sure the image content is not cut, and is all included inside the borders of the image with a little internal padding.",
n: 1,
size: size,
model: model,
quality: quality
})
});

const data = await response.json();
console.log(data);
if (!response.ok) throw new Error(data?.error?.message || response.statusText);

let imageSrc;
if (data?.data?.[0]?.url) imageSrc = data.data[0].url;
else if (data?.data?.[0]?.b64_json) imageSrc = "data:image/png;base64," + data.data[0].b64_json;
else throw new Error("No valid image data received.");

const responseDiv = document.createElement("div");
responseDiv.classList.add("chatgpt-messageIMG");
const image = document.createElement("img");
image.src = imageSrc;
image.alt = "Generated Image";
image.classList.add("generatedimg");
responseDiv.appendChild(image);

const downloadLink = document.createElement("a");
downloadLink.href = imageSrc;
downloadLink.download = "generated.png";
downloadLink.textContent = "Download Image";
responseDiv.appendChild(document.createElement("br"));
responseDiv.appendChild(downloadLink);

chatContainer.removeChild(typingIndicator);
chatContainer.appendChild(responseDiv);
} catch (error) {
console.error(error);
alert("An error occurred during request. Check your API Key or your OpenAI account.");
}
}
</script>
</body>
</html>
