<label>Model:</label>
<select id="modelSelect">
<option value="gpt-image-1-mini" selected>gpt-image-1-mini</option>
<option value="gpt-image-1">gpt-image-1</option>
<option value="gpt-image-1.5">gpt-image-1.5</option>
</select>

<label>Size:</label>
<select id="sizeSelect">
<option value="1024x1024" selected>1024x1024 (square)</option>
<option value="1536x1024">1536x1024 (landscape)</option>
<option value="1024x1536">1024x1536 (portrait)</option>
</select>

<label>Quality:</label>
<select id="qualitySelect">
<option value="low">low</option>
<option value="medium" selected>medium</option>
<option value="high">high</option>
</select>
<br><br>

<div>
<button class="btn btn-primary" type="button" onclick="applyPreset('ultra')">Ultra Quality</button>
<button class="btn btn-primary" type="button" onclick="applyPreset('optimized')">Optimized</button>
<button class="btn btn-primary" type="button" onclick="applyPreset('cheap')">Extra Cheap</button>
</div>
<br>

<button class="btn btn-primary" onclick="generateImage()">Send</button>
</div>

<section class="history">
<div id="chat-containerIMG" class="chathistory"></div>
</section>
</main>

<script>
function myFunction() {
var x = document.getElementById("myTopnav");
if (x.className === "topnav") x.className += " responsive";
else x.className = "topnav";
}

// Funzione per applicare preset
function applyPreset(type) {
const modelSel = document.getElementById("modelSelect");
const sizeSel = document.getElementById("sizeSelect");
const qualitySel = document.getElementById("qualitySelect");

if (type === "ultra") {
modelSel.value = "gpt-image-1.5";
sizeSel.value = "1024x1024";
qualitySel.value = "high";
} else if (type === "optimized") {
modelSel.value = "gpt-image-1";
sizeSel.value = "1024x1024";
qualitySel.value = "medium";
} else if (type === "cheap") {
modelSel.value = "gpt-image-1-mini";
sizeSel.value = "1024x1024";
qualitySel.value = "low";
}
}

async function generateImage() {
const apikey = localStorage.getItem("openaikey");
document.getElementById("apikey").value = apikey;

const prompt = document.getElementById("prompt").value;
const model = document.getElementById("modelSelect").value;
const size = document.getElementById("sizeSelect").value;
const quality = document.getElementById("qualitySelect").value;

const chatContainer = document.getElementById("chat-containerIMG");

const promptDiv = document.createElement("div");
promptDiv.classList.add("user-message");
promptDiv.textContent = `Prompt: ${prompt}`;
chatContainer.appendChild(promptDiv);

const typingIndicator = document.createElement("p");
typingIndicator.id = "typing-indicatorIMG";
typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
chatContainer.appendChild(typingIndicator);

try {
const response = await fetch("https://api.openai.com/v1/images/generations", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + apikey
},
body: JSON.stringify({
prompt: prompt + " MANDATORY: make sure the image content is not cut, and is all included inside the borders of the image with a little internal padding.",
n: 1,
size: size,
model: model,
quality: quality
})
});

const data = await response.json();
console.log(data);
if (!response.ok) throw new Error(data?.error?.message || response.statusText);

let imageSrc;
if (data?.data?.[0]?.url) imageSrc = data.data[0].url;
else if (data?.data?.[0]?.b64_json) imageSrc = "data:image/png;base64," + data.data[0].b64_json;
else throw new Error("No valid image data received.");

const responseDiv = document.createElement("div");
responseDiv.classList.add("chatgpt-messageIMG");
const image = document.createElement("img");
image.src = imageSrc;
image.alt = "Generated Image";
image.classList.add("generatedimg");
responseDiv.appendChild(image);

const downloadLink = document.createElement("a");
downloadLink.href = imageSrc;
downloadLink.download = "generated.png";
downloadLink.textContent = "Download Image";
responseDiv.appendChild(document.createElement("br"));
responseDiv.appendChild(downloadLink);

chatContainer.removeChild(typingIndicator);
chatContainer.appendChild(responseDiv);
} catch (error) {
console.error(error);
alert("An error occurred during request. Check your API Key or your OpenAI account.");
}
}
</script>
</body>
</html>
