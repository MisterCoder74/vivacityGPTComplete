<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">        
  <title>VivacityGPT Complete - AI voice chatbot</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css'>
  <link rel="stylesheet" href="css/core.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>         

<main class="main-container">
  <h1 class="heading">AI Voice Chatbot</h1>
  <p class="info"></p>

<form  id="search-form">  

<input id="prompt" type="text" placeholder="Activate Microphone to chat..." autocomplete="off" autofocus disabled><br>

</form>
<section style="display: flex; justify-content: center; gap: 1rem; align-items: center; width: 22rem; margin: .25rem auto;">        
<select id="languageSelector">
<option value="en-US" selected>English (US)</option>
<option value="it-IT">Italiano</option>
<option value="fr-FR">Français</option>
<option value="es-ES">Español</option>
<option value="de-DE">Deutsch</option>
</select>         
<button id="saveChatBtn" type="button" class="btn">Save Chat</button> 
</section>        
<div id="chathistory">
</div>

<audio controls id="audioPlayer" style="display: none;"></audio>
      
</main>

<script>
// === ELEMENTI DOM PRINCIPALI ===
const searchForm = document.querySelector("#search-form");
const searchFormInput = searchForm.querySelector("input");
const info = document.querySelector(".info");
const chatContainer = document.getElementById("chathistory");
let recognition;
let chatMemory = createMemory([{ role: "system", content: "You are a funny bot." }]);
       

// === AVVIO SPEECH RECOGNITION ===
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
console.log("Browser supports Speech Recognition");
recognition = new SpeechRecognition();
recognition.continuous = true;
recognition.lang = "en-US"; // valore di default 
        
const languageSelector = document.getElementById("languageSelector");

languageSelector.addEventListener("change", () => {
recognition.lang = languageSelector.value;
console.log(`Recognition language set to ${recognition.lang}`);
});        

searchForm.insertAdjacentHTML("beforeend", '<button type="button"><i class="fas fa-microphone"></i></button>');
searchFormInput.style.paddingRight = "50px";

const micBtn = searchForm.querySelector("button");
const micIcon = micBtn.firstElementChild;

micBtn.addEventListener("click", micBtnClick);
function micBtnClick() {
if (micIcon.classList.contains("fa-microphone")) recognition.start();
else recognition.stop();
}

recognition.addEventListener("start", () => {
micIcon.classList.remove("fa-microphone");
micIcon.classList.add("fa-microphone-slash");
searchFormInput.focus();
console.log("Ascolto...");
});

recognition.addEventListener("end", () => {
micIcon.classList.remove("fa-microphone-slash");
micIcon.classList.add("fa-microphone");
console.log("Speech recognition disabled");
});

recognition.addEventListener("result", resultOfSpeechRecognition);

function resultOfSpeechRecognition(event) {
const current = event.resultIndex;
const transcript = event.results[current][0].transcript.trim();
searchFormInput.value = transcript;

// 🔁 Reset timer a ogni nuova frase riconosciuta
clearTimeout(window.idleTimer);
window.idleTimer = setTimeout(() => {
try { recognition.stop(); } catch (_) {}
}, 2000); // ferma dopo 2 s di silenzio        
        
// trigger vocali
const lowerTranscript = transcript.toLowerCase();
const triggerImageEn = "generate image with";
const triggerImageIt = "genera immagine con";
const triggerSearchEn = "search on the internet";
const triggerSearchIt = "cerca su internet";

if (lowerTranscript.includes(triggerImageEn) || lowerTranscript.includes(triggerImageIt)) {
const trigger = lowerTranscript.includes(triggerImageEn) ? triggerImageEn : triggerImageIt;
const prompt = transcript.substring(lowerTranscript.indexOf(trigger) + trigger.length).trim();
generateImage(prompt);
} else if (lowerTranscript.includes(triggerSearchEn) || lowerTranscript.includes(triggerSearchIt)) {
const triggerDetected = lowerTranscript.includes(triggerSearchEn) ? triggerSearchEn : triggerSearchIt;
const searchPrompt = transcript.substring(lowerTranscript.indexOf(triggerDetected) + triggerDetected.length).trim();
getChatGPTResponseWeb(searchPrompt, chatMemory);
} else {
sendMessage(transcript);
}
}

info.innerHTML =
    'In your speech, you can use:<br>1) <b>"generate image with / genera immagine con "</b> followed by the description to generate an image<br>2) <b>"search on the internet / cerca su internet"</b> followed by a topic to search on the web';
} else {
  console.log("Your Browser does not support speech Recognition");
  info.textContent = "Your Browser does not support Speech Recognition";
}

// === GESTIONE MEMORIA CONTESTUALE ===
function createMemory(messages) {
const memory = [];
for (const msg of messages) memory.push({ role: msg.role, content: msg.content });
return memory;
}

// === MESSAGGI CHAT ===
function showMessage(sender, message, tokens, downloadLink) {
const typingIndicator = document.getElementById("typing-indicator");
if (typingIndicator && sender === "VivacityGPT") chatContainer.removeChild(typingIndicator);

const messageElement = document.createElement("div");
if (sender === "Guest") {
messageElement.innerHTML = `<p class="user-message"><b>${sender}</b>: ${message}</p>`;
} else {
const timestampElement = document.createElement("p");
timestampElement.innerHTML = `${sender}: ${message}`;
timestampElement.classList.add("chatgpt-message");
messageElement.appendChild(timestampElement);
if (tokens) messageElement.innerHTML += tokens;
if (downloadLink) messageElement.innerHTML += downloadLink;
}

chatContainer.appendChild(messageElement);
chatContainer.scrollTop = chatContainer.scrollHeight;
}

// === 🔊 NUOVO SENDMESSAGE con GPT‑4o‑AUDIO‑PREVIEW ===
async function sendMessage(transcript) {
const apikey = localStorage.getItem("openaikey");
if (!apikey) {
alert("No OpenAI API Key found. Go to Index page and open the Setup panel.");
return;
}

const userInput = transcript.trim();
if (userInput === "") return;

showMessage("Guest", userInput, "");

// ⛔️ Ferma l'ascolto mentre il bot elabora/parla
if (recognition) try { recognition.stop(); } catch (_) {}

const typingIndicator = document.createElement("p");
typingIndicator.id = "typing-indicator";
typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
chatContainer.appendChild(typingIndicator);

try {
const res = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": `Bearer ${apikey}`,
},
body: JSON.stringify({
model: "gpt-4o-audio-preview",
modalities: ["text", "audio"],
audio: { voice: "alloy", format: "wav" },
messages: [
{ role: "system", content: `You are a helpful multilingual AI. Reply in the language: ${recognition.lang}` },
...chatMemory,
{ role: "user", content: userInput }
]
})
});

if (!res.ok) throw new Error("Errore richiesta API");
const data = await res.json();
const msg = data.choices[0].message;

// ✅ Estrai sempre la parte testuale
let replyText = "";
if (msg.audio && msg.audio.transcript) {
replyText = msg.audio.transcript;
} else if (Array.isArray(msg.content)) {
const textPart = msg.content.find(p => p.type === "output_text");
if (textPart) replyText = textPart.text;
} else if (typeof msg.content === "string") {
replyText = msg.content;
}

const audioBase64 = msg.audio?.data;

chatContainer.removeChild(typingIndicator);
showMessage("VivacityGPT", replyText || "[nessuna risposta]");
// 🎧 Riproduci audio e riavvia microfono solo dopo
if (audioBase64) {
const audioBlob = base64ToBlob(audioBase64, "audio/wav");
const audioUrl = URL.createObjectURL(audioBlob);
const player = document.getElementById("audioPlayer");
player.src = audioUrl;
player.play();

player.onended = () => {
// ✅ Riattiva solo se non già in esecuzione
try {
recognition.start();
} catch (e) {
console.log("Recognition not restarted (already active or not supported).")
}
};
} else {
// Se nessun audio, riavvia subito il riconoscimento
try { recognition.start(); } catch (_) {}
}

chatMemory.push({ role: "user", content: userInput });
chatMemory.push({ role: "assistant", content: replyText });

} catch (err) {
console.error(err);
alert("Error during request. Retry later.");
try { recognition.start(); } catch (_) {}
}
}

function base64ToBlob(base64, mime) {
const byteChars = atob(base64);
const byteNumbers = new Array(byteChars.length);
for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
const byteArray = new Uint8Array(byteNumbers);
return new Blob([byteArray], { type: mime });
}

// === 🖼️ GENERAZIONE IMMAGINE ===
async function generateImage(prompt) {
const apikey = localStorage.getItem("openaikey");
if (!apikey) {
alert("API Key missing.");
return;
}

showMessage("VivacityGPT", "Sure, I am generating the requested image.");
const requestDiv = document.createElement("div");
requestDiv.classList.add("user-message");
requestDiv.innerHTML = `Prompt for image: <b>${prompt}</b>`;
chatContainer.appendChild(requestDiv);

const typingIndicator = document.createElement("p");
typingIndicator.id = "typing-indicatorIMG";
typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
chatContainer.appendChild(typingIndicator);

try {
const res = await fetch("https://api.openai.com/v1/images/generations", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + apikey
},
body: JSON.stringify({
model: "dall-e-3",
prompt: prompt,
n: 1,
size: "1024x1024"
})
});

const data = await res.json();
if (data.data && data.data.length > 0) {
const imageUrl = data.data[0].url;
chatContainer.removeChild(typingIndicator);

const responseDiv = document.createElement("div");
responseDiv.classList.add("chatgpt-message");
const image = document.createElement("img");
image.src = imageUrl;
image.alt = "Generated Image";
image.classList.add("generatedimg");
responseDiv.appendChild(image);

const downloadLink = document.createElement("a");
downloadLink.href = imageUrl;
downloadLink.target = "_blank";
downloadLink.textContent = "Download Image";
responseDiv.appendChild(document.createElement("br"));
responseDiv.appendChild(downloadLink);
chatContainer.appendChild(responseDiv);
try { recognition.start(); } catch (_) {}
} else {
throw new Error("No image data received");
}
} catch (error) {
console.error(error);
alert("Error while generating image. Retry later.");
}
}

// === 🌐 RICERCA WEB (mantiene logica originale) ===
async function getChatGPTResponseWeb(userInput, chatMemory = []) {
const apikey = localStorage.getItem("openaikey");
if (!apikey) {
alert("API Key missing.");
return;
}

// Messaggio vocale e testuale di conferma
showMessage("VivacityGPT", "Sure, I am retrieving the requested information.");

const typingIndicator = document.createElement("p");
typingIndicator.id = "typing-indicator";
typingIndicator.innerHTML =
'<img src="preloader.gif" class="preloader" alt="Loading...">';
chatContainer.appendChild(typingIndicator);

// ⛔ Stop recognition mentre lavora
if (recognition) try { recognition.stop(); } catch (_) {}

try {
const response = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer " + apikey
},
body: JSON.stringify({
model: "gpt-4o-mini-search-preview",
web_search_options: { search_context_size: "medium" },
messages: [
...chatMemory,
{ role: "user", content: userInput }
]
})
});

if (!response.ok) throw new Error("Error during request.");
const data = await response.json();

chatContainer.removeChild(typingIndicator);

// === Estraggo testo e citazioni ===
const msg = data.choices[0].message;
const reply = msg.content || "";

const citations = msg.annotations || [];
const citationLinks = [];

if (Array.isArray(citations) && citations.length > 0) {
citations.forEach((a) => {
if (a.type === "url_citation" && a.url_citation) {
const { title, url } = a.url_citation;
const safeTitle = title || url;
citationLinks.push(
`<a href="${url}" target="_blank" rel="noopener">${safeTitle}</a>`
);
}
});
}

// Combina corpo testo + riferimenti
let replyHtml = reply;
if (citationLinks.length > 0) {
replyHtml += "<br><strong>References:</strong><br>" + citationLinks.join("<br>");
}

// Mostra il messaggio finale
showMessage("VivacityGPT", replyHtml);

// Aggiorna memoria conversazione
chatMemory.push({ role: "user", content: userInput });
chatMemory.push({ role: "assistant", content: reply });

// 🔁 Riattiva il riconoscimento vocale
try { recognition.start(); } catch (_) {}

return chatMemory;

} catch (error) {
console.error(error);
alert("Error during web search or API connetion.");
// Riattiva comunque il microfono se l'esecuzione si interrompe
try { recognition.start(); } catch (_) {}
}
}

// === SALVATAGGIO CHAT IN TXT ===
document.getElementById("saveChatBtn").addEventListener("click", () => {
const chatContent = document.getElementById("chathistory").innerText.replace(/Copy/g, "");
const filename = "chatsession_v" + new Date().toISOString().replace(/[-:.]/g, "");
const blob = new Blob([chatContent], { type: "text/plain" });
const url = URL.createObjectURL(blob);
const link = document.createElement("a");
link.href = url;
link.download = `${filename}.txt`;
link.click();
URL.revokeObjectURL(url);
});

function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

</script>


</body>
</html>
