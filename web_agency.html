    <script>
        const API_KEY = localStorage.getItem("openaikey");
   
        console.log(API_KEY);

  if (API_KEY === "") {
    alert("No OpenAI API Key found.");
  } else {
    console.log(API_KEY);
  }
        const FRONTEND_DEV = `<?php echo addslashes($frontendDev); ?>`;
        const BACKEND_DEV = `<?php echo addslashes($backendDev); ?>`;
        const COLLABORATION_PROTOCOL = `<?php echo addslashes($collaborationProtocol); ?>`;
        
        let conversationHistory1 = [];
        let conversationHistory2 = [];
        let isRunning = false;
        let currentTurn = 1;
        let exchangeCount = 0;
        const MAX_EXCHANGES = 15;
        
        const chatbox1 = document.getElementById('chatbox1');
        const chatbox2 = document.getElementById('chatbox2');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const startPhrase = document.getElementById('startPhrase');
        const status = document.getElementById('status');
        const exchangeCounter = document.getElementById('exchangeCounter');
        const exchangeNum = document.getElementById('exchangeNum');
            
        function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}    
        
        function showStatus(message) {
            status.textContent = message;
            status.style.display = 'block';
        }
        
        function hideStatus() {
            status.style.display = 'none';
        }

        function updateExchangeCounter() {
            exchangeNum.textContent = exchangeCount;
            exchangeCounter.style.display = 'block';
            if (exchangeCount >= MAX_EXCHANGES) {
                exchangeCounter.style.background = '#ffcdd2';
                exchangeCounter.style.color = '#c62828';
            }
        }
        
        function addMessage(chatbox, message, className) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${className}`;
            messageDiv.textContent = message;
            chatbox.appendChild(messageDiv);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        
        async function generateResponse(personality, conversationHistory, userMessage) {
            const API_URL = "https://api.openai.com/v1/chat/completions";
            
            const messages = [
                {role: "system", content: personality + "\n\n" + COLLABORATION_PROTOCOL},
                ...conversationHistory,
                {role: "user", content: userMessage}
            ];
            
            const requestOptions = {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: messages,
                })
            };
            
            try {
                const response = await fetch(API_URL, requestOptions);
                const data = await response.json();
                return data.choices[0].message.content.trim();
            } catch (error) {
                console.error('Error:', error);
                return "Error generating response.";
            }
        }
        
        async function conversationLoop(initialMessage) {
            let currentMessage = initialMessage;
            
            addMessage(chatbox1, `Project Request: ${initialMessage}`, 'from-bot1');
            
            while (isRunning && exchangeCount < MAX_EXCHANGES) {
                if (currentTurn === 1) {
                    showStatus('Frontend Developer is analyzing...');
                    addMessage(chatbox1, 'Analyzing...', 'thinking');
                    
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    if (!isRunning) break;
                    
                    const response1 = await generateResponse(FRONTEND_DEV, conversationHistory1, currentMessage);
                    
                    const thinkingMsg = chatbox1.querySelector('.thinking');
                    if (thinkingMsg) thinkingMsg.remove();
                    
                    addMessage(chatbox1, response1, 'from-bot1');
                    conversationHistory1.push({role: "user", content: currentMessage});
                    conversationHistory1.push({role: "assistant", content: response1});
                    
                    currentMessage = response1;
                    currentTurn = 2;
                    exchangeCount++;
                    updateExchangeCounter();
                    
                } else {
                    showStatus('Backend Developer is responding...');
                    addMessage(chatbox2, 'Processing...', 'thinking');
                    
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    if (!isRunning) break;
                    
                    const response2 = await generateResponse(BACKEND_DEV, conversationHistory2, currentMessage);
                    
                    const thinkingMsg = chatbox2.querySelector('.thinking');
                    if (thinkingMsg) thinkingMsg.remove();
                    
                    addMessage(chatbox2, response2, 'from-bot2');
                    conversationHistory2.push({role: "user", content: currentMessage});
                    conversationHistory2.push({role: "assistant", content: response2});
                    
                    currentMessage = response2;
                    currentTurn = 1;
                    exchangeCount++;
                    updateExchangeCounter();
                }
            }
            
            if (exchangeCount >= MAX_EXCHANGES) {
                showStatus('⚠️ Maximum exchanges reached! Generating final code...');
                await generateFinalCode();
            }
            
            hideStatus();
        }

        async function generateFinalCode() {
            showStatus('Frontend generating final code...');
            
            const frontendFinalPrompt = "Agreement phase complete. Now generate the complete, production-ready code with NO comments, NO explanations. Output only the pure code ready to copy-paste.";
            const frontendCode = await generateResponse(FRONTEND_DEV, conversationHistory1, frontendFinalPrompt);
            
            addMessage(chatbox1, '=== FINAL CODE ===', 'from-bot1');
            addMessage(chatbox1, frontendCode, 'from-bot1');
            
            showStatus('Backend generating final code...');
            
            const backendFinalPrompt = "Agreement phase complete. Now generate the complete, production-ready PHP code with NO comments, NO explanations. Output only the pure code ready to copy-paste.";
            const backendCode = await generateResponse(BACKEND_DEV, conversationHistory2, backendFinalPrompt);
            
            addMessage(chatbox2, '=== FINAL CODE ===', 'from-bot2');
            addMessage(chatbox2, backendCode, 'from-bot2');
            
            showStatus('✅ Code generation complete! Use SAVE CODE button.');
        }
        
        startBtn.addEventListener('click', () => {
            const initialMessage = startPhrase.value.trim();
            
            if (!initialMessage) {
                alert('Please describe the project requirements!');
                return;
            }
            
            chatbox1.innerHTML = '';
            chatbox2.innerHTML = '';
            conversationHistory1 = [];
            conversationHistory2 = [];
            currentTurn = 1;
            exchangeCount = 0;
            
            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            startPhrase.disabled = true;
            
            updateExchangeCounter();
            showStatus('Development team initialized!');
            conversationLoop(initialMessage);
        });
        
        stopBtn.addEventListener('click', () => {
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            startPhrase.disabled = false;
            showStatus('Development stopped!');
            setTimeout(hideStatus, 2000);
        });
        
        saveBtn.addEventListener('click', () => {
            if (conversationHistory1.length === 0 && conversationHistory2.length === 0) {
                alert('No conversation to save!');
                return;
            }
            
            let conversationText = '=== DEV TEAM COLLABORATION LOG ===\n\n';
            conversationText += 'Date: ' + new Date().toLocaleString('en-US') + '\n';
            conversationText += 'Project: ' + startPhrase.value + '\n';
            conversationText += 'Total Exchanges: ' + exchangeCount + '\n\n';
            conversationText += '--- COLLABORATION TRANSCRIPT ---\n\n';
            
            const maxLength = Math.max(conversationHistory1.length, conversationHistory2.length);
            
            for (let i = 0; i < maxLength; i += 2) {
                if (i < conversationHistory1.length) {
                    conversationText += `FRONTEND DEV (receives): ${conversationHistory1[i].content}\n`;
                    if (i + 1 < conversationHistory1.length) {
                        conversationText += `FRONTEND DEV (responds): ${conversationHistory1[i + 1].content}\n\n`;
                    }
                }
                
                if (i < conversationHistory2.length) {
                    conversationText += `BACKEND DEV (receives): ${conversationHistory2[i].content}\n`;
                    if (i + 1 < conversationHistory2.length) {
                        conversationText += `BACKEND DEV (responds): ${conversationHistory2[i + 1].content}\n\n`;
                    }
                }
            }
            
            conversationText += '\n--- END OF COLLABORATION ---';
            
            const blob = new Blob([conversationText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dev_team_log_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showStatus('Collaboration log saved!');
            setTimeout(hideStatus, 2000);
        });
    </script>
