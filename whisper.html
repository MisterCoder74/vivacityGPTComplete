<body>
<div class="topnav" id="myTopnav">

<main class="main-container">
<h1 class="heading">OpenAI Whisper</h1>
<hr>
<label for="audioFileInput">Select an audio file (MP3, M4A, WAV):</label><br>
<input type="file" id="audioFileInput" accept=".mp3,.m4a,.wav"><br>
<label for="apikey">Your API key (read only):</label><br>
<input type="password" id="apikey" placeholder="Your API key" readonly><br>
<label for="languageSelect" style="color:black;">Select Target Language:</label><br>
<select id="languageSelect" style="padding: 0.5rem; border-radius:10px; margin-bottom:1.5rem;">
<option value="en">English</option>
<option value="it">Italian</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="de">German</option>
<option value="ja">Japanese</option>
<option value="zh">Chinese (Mandarin)</option>
<option value="ko">Korean</option>
<option value="tr">Turkish</option>
<option value="az">Azerbaijani</option>
<option value="ru">Russian</option>
<option value="pt">Portuguese</option>        
</select><br>        
<div id="commands">
<button class="btn btn-primary" onclick="transcribeAudio()">Transcribe Audio</button>
<button class="btn btn-primary" onclick="translateToLanguage()">Translate Audio</button>
<button class="btn" id="export">Save Result</button>
</div>
<div id="costEstimate"></div>
<div id="transcriptionResult"></div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function myFunction() {
var x = document.getElementById("myTopnav");
if (x.className === "topnav") {
x.className += " responsive";
} else {
x.className = "topnav";
}
}

// Funzione comune per Whisper
function sendWhisperRequest(endpoint) {
const apikey = localStorage.getItem("openaikey");
document.getElementById("apikey").value = apikey;
const audioFile = document.getElementById("audioFileInput").files[0];
const resultDiv = document.getElementById('transcriptionResult');
const costEstimate = document.getElementById('costEstimate');

if (!audioFile) {
alert("Please upload an audio file before continuing.");
return;
}

const formData = new FormData();
formData.append('file', audioFile);
formData.append('model', 'whisper-1');

// feedback visivo
resultDiv.style.display = "flex";
resultDiv.innerText = "⏳ Processing audio… please wait.";
costEstimate.innerText = "Calculating cost…";

// Stima costo approssimata: Whisper $0.006/minuto
const estimatedDurationSec = audioFile.size / (16000 * 2 * 1); // stima se 16kHz mono PCM
const estMinutes = estimatedDurationSec / 60;
const estimatedCost = (estMinutes * 0.006).toFixed(4);
costEstimate.innerText = "Estimated cost: about $" + estimatedCost;

return fetch(`https://api.openai.com/v1/audio/${endpoint}`, {
method: "POST",
headers: { 'Authorization': `Bearer ${apikey}` },
body: formData
})
.then(res => {
if (!res.ok) throw new Error("HTTP " + res.status);
return res.json();
})
.then(data => {
resultDiv.innerText = data.text || "No transcription returned.";
})
.catch(err => {
resultDiv.innerText = "❌ Error: " + err.message;
});
}

function transcribeAudio() {
sendWhisperRequest("transcriptions");
}

async function translateToLanguage() {
const apikey = localStorage.getItem("openaikey");
document.getElementById("apikey").value = apikey;
const audioFile = document.getElementById("audioFileInput").files[0];
const selectedLang = document.getElementById("languageSelect").value;
const resultDiv = document.getElementById('transcriptionResult');
const costEstimate = document.getElementById('costEstimate');

if (!audioFile) {
alert("Please upload an audio file first.");
return;
}

resultDiv.style.display = "flex";
resultDiv.innerText = "⏳ Step 1: Translating audio to English...";
costEstimate.innerText = "Calculating cost…";

// stima costo Whisper
const estimatedDurationSec = audioFile.size / (16000 * 2 * 1);
const estMinutes = estimatedDurationSec / 60;
const estimatedCost = (estMinutes * 0.006).toFixed(4);
costEstimate.innerText = "Estimated cost (Whisper step): about $" + estimatedCost;

// 1️⃣ Traduzione Whisper → inglese
const formData = new FormData();
formData.append('file', audioFile);
formData.append('model', 'whisper-1');

let englishText = "";

try {
const whisperResponse = await fetch("https://api.openai.com/v1/audio/translations", {
method: "POST",
headers: {
"Authorization": `Bearer ${apikey}`
},
body: formData
});

if (!whisperResponse.ok)
throw new Error("Error from Whisper: HTTP " + whisperResponse.status);

const whisperData = await whisperResponse.json();
englishText = whisperData.text;

if (!englishText) throw new Error("No English text returned.");

resultDiv.innerText = "✅ Step 1 complete.\n\n⏳ Step 2: Translating English text to " + selectedLang.toUpperCase() + "...";

} catch (err) {
resultDiv.innerText = "❌ Whisper translation error: " + err.message;
return;
}

// 2️⃣ GPT‑4o mini → lingua scelta
try {
const prompt = `Translate the following English text into ${selectedLang.toUpperCase()}:\n\n${englishText}.\n\n For languages that do not use the Western European alphabet, also add a version in latin alphabet.`;

const chatResponse = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": `Bearer ${apikey}`
},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{role: "system", content: "You are a professional translator."},
{role: "user", content: prompt}
]
})
});

if (!chatResponse.ok)
throw new Error("Error from GPT model: HTTP " + chatResponse.status);

const chatData = await chatResponse.json();
const translatedText = chatData.choices?.[0]?.message?.content || "No translation returned.";

resultDiv.innerText =
`✅ Translation completed (${selectedLang.toUpperCase()}):\n\n${translatedText}`;

// stima costo GPT‑4o mini (circa $0.00015 / 1k token → testuale molto limitato)
const addCost = 0.0005;
costEstimate.innerText += ` + GPT step ≈ $${addCost.toFixed(4)} (total ≈ $${(parseFloat(estimatedCost) + addCost).toFixed(4)})`;

} catch (err) {
resultDiv.innerText = "❌ GPT translation error: " + err.message;
}
}
// Save Chat Function
var saveButtont = document.getElementById("export");
saveButtont.addEventListener("click", handleSaveButtontClick);

function handleSaveButtontClick() {
saveChatContentTxt();
}

function saveChatContentTxt() {
var chatContent = document.getElementById("transcriptionResult").innerText;
var currentTimestamp = new Date();
var datetime = currentTimestamp.toISOString();
var filename = "whisper_v" + datetime.replace(/[-:.]/g, "");
var blob = new Blob([chatContent], { type: "text/plain" });
var url = URL.createObjectURL(blob);
var downloadLink = document.createElement("a");
downloadLink.href = url;
downloadLink.download = filename + ".txt";
downloadLink.click();
URL.revokeObjectURL(url);

// --- feedback utente ---
const resultDiv = document.getElementById("transcriptionResult");
if (resultDiv) {
const feedback = document.createElement("div");
feedback.innerText = "✅ File saved successfully!";
feedback.style.color = "white";
feedback.style.fontSize = "1rem";
feedback.style.marginTop = "1rem";
feedback.style.textAlign = "center";
feedback.style.background = "rgba(4, 190, 109, 0.6)";
feedback.style.padding = "0.5rem 1rem";
feedback.style.borderRadius = "6px";
resultDiv.appendChild(feedback);

// Rimozione del messaggio dopo 3 secondi
setTimeout(() => {
feedback.remove();
}, 3000);
}
}
</script>
</body>
</html>
