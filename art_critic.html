<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivacityGPT Complete - AI Art Critic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="txtchatbot.html">Master Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html" class="active">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
  <h1 class="heading">AI Art Critic</h1>

  <div class="container">
    <div class="image-box" id="original-image">
      <img id="uploaded-image" src="" alt="Uploaded Image" style="max-width: 90%; display: none;">
    </div>
  </div>

  <div id="voperations">
    <form enctype="multipart/form-data" method="POST">
      <input class="fixedwidth" type="file" accept=".jpg,.png" name="file" id="vfile-input">
      <div id="vfeedback"></div>
      <button id="vuploadBtn" class="btn btn-primary">Upload the image</button>
      <button type="button" class="btn btn-primary" onclick="getChatGPTResponseIMG();">Analyze the image</button>
    </form>
  </div>

  <div id="text-box">
    <b>Your Image analysis will appear here...</b>
    <p id="image-analysis-output"></p>
  </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $(document).ready(function () {
    $('#vuploadBtn').click(function (e) {
      e.preventDefault();
      $.ajax({
        url: 'vupload.php',
        type: 'POST',
        data: new FormData($('form')[0]),
        processData: false,
        contentType: false,
        success: function (response) {
          const data = JSON.parse(response);
          if (data.status === "success") {
            $('#vfeedback').html("Your file was uploaded.");
            var fileInput = document.getElementById('vfile-input');
            var file = fileInput.files[0];
            if (file) {
              var originalimageUrl = URL.createObjectURL(file);
              $('#uploaded-image').attr('src', originalimageUrl).show();
            }
            $('#voperations button[type="button"]').attr('onclick', `submitImage("${data.url}");`);
          } else {
            $('#vfeedback').html(data);
          }
        }
      });
    });
  });

  function myFunction() {
    var x = document.getElementById("myTopnav");
    if (x.className === "topnav") {
      x.className += " responsive";
    } else {
      x.className = "topnav";
    }
  }

  let chatMemory = [];
  chatMemory = createMemory([{
    role: "system",
    content: "You are an AI Art Critic. You will analyze the uploaded image and you will provide a critic artistic analysis focalizing on the following points: style, choice of coors, overall meaning, captured feelings. If applicable, you will provide example of famous artists with a similar style, and you will suggest how to improve the art work."
  }]);

  function createMemory(messages) {
    const memory = [];
    for (const msg of messages) {
      memory.push({
        role: msg.role,
        content: msg.content
      });
    }
    return memory;
  }

  async function submitImage(imgUrl) {
    return await getChatGPTResponseIMG("https://www.vivacitydesign.net/vdgptscomplete/" + imgUrl, chatMemory);
  }

  async function getChatGPTResponseIMG(fileUrl, chatMemory) {
    console.log(fileUrl);
    const apikey = localStorage.getItem("openaikey");
    console.log(apikey);

    if (apikey === "") {
      alert("No OpenAI API Key found.");
      return;
    }

    const chatContainer = document.getElementById("text-box");
    const typingIndicator = document.createElement("p");
    typingIndicator.id = "typing-indicator";
    typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
    chatContainer.appendChild(typingIndicator);

    try {
      response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + apikey
        },
        body: JSON.stringify({
          model: "gpt-4.1-nano",
          messages: [
            ...chatMemory.map((item) => ({ ...item })),
            {
              role: "user",
              content: [
                {
                  type: "text",
                  text: "You are an AI Art Critic. You will analyze the uploaded image and you will provide a critic artistic analysis focalizing on the following points: style, choice of coors, overall meaning, captured feelings. If applicable, you will provide example of famous artists with a similar style, and you will suggest how to improve the art work. Don't thank, greet or propose the user to ask further questions."
                },
                {
                  type: "image_url",
                  image_url: {
                    url: fileUrl
                  }
                }
              ]
            }
          ],
          max_tokens: 600
        })
      });

      if (!response.ok) {
        throw new Error("Error while requesting to the API.");
      }

      const data = await response.json();
      if (!data.choices || !data.choices.length || !data.choices[0].message || !data.choices[0].message.content) {
        throw new Error("Invalid API response.");
      }

      var chatGPTResponse = data.choices[0].message.content;
      chatGPTResponse = chatGPTResponse.replace(/\*\*(.*?)\*\*/g, "$1");

      chatContainer.removeChild(typingIndicator);
      const responsediv = document.getElementById("image-analysis-output");
      responsediv.innerText = chatGPTResponse;

      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      const fileName = `critic_response_${timestamp}.txt`;
      const blob = new Blob([chatGPTResponse], { type: 'text/plain' });
      const link = document.createElement("a");
      link.href = window.URL.createObjectURL(blob);
      link.download = fileName;
      link.innerText = "Download Analysis";
      link.style.display = "block";
      link.style.marginTop = "10px";
      chatContainer.appendChild(link);

      chatMemory.push({ role: "user", content: fileUrl });
      chatMemory.push({ role: "assistant", content: chatGPTResponse });

      return chatMemory;
    } catch (error) {
      console.error(error);
      alert("An error occurred during the request. Check your OpenAI account or try later.");
    }
  }
</script>
</body>
</html>
