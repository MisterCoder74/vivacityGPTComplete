<!DOCTYPE html>
<html lang="en">
<head>
<title>VivacityGPT Complete - TXT Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
</head>
<body>
<div class="topnav" id="myTopnav">
  <a href="index.html">Home</a>
  <a href="total_chatbot.html">Total Analyzer</a>
  <a href="#" class="active">Text Chatbot</a>
  <a href="devbot.html">Web Dev Bot</a>
  <a href="dalle.html">Image Creator</a>
  <a href="pdfchatbot.html">PDF Chatbot</a>
  <a href="tts.html">Text to Speech</a>
  <a href="whisper.html">Audio Transcriber</a>
  <a href="vd_gpts.html">VD GPTs</a>
  <a href="javascript:void(0);" class="icon" onclick="myFunction()">
    <i class="fa fa-bars"></i>
  </a>
</div>

<main class="main-container">
<h1 class="heading">OpenAI Text Chatbot</h1>
<small>Based on gpt-5-nano, gpt-4.1-nano and gpt-4o-mini models</small>
<hr>

<div class="userinput">
  <input type="password" id="apikey" placeholder="Your API key" readonly><br>
  <textarea rows="8" id="prompt" placeholder="Your prompt" autocomplete="off" autofocus></textarea><br>
  <button class="btn btn-primary" onclick="sendMessage()">Send</button>
  <button class="btn btn-secondary" onclick="sendWeb()">Search the Web</button>
</div>

<section id="content">
  <aside id="menu">
    <details>
      <summary>TXT Analyzer</summary>
      <div id="operations">
        <form enctype="multipart/form-data" method="POST">
          <input type="file" accept=".txt,.rtf,.xml,.html,.css,.js,.json,.vb,.php" name="file" id="file-input">
          <div id="feedback"></div>
          <button id="uploadBtn" class="btn btn-primary" type="submit">Upload</button>
          <button type="button" class="btn btn-secondary" onclick="analyzeFile();">Analyze</button>
        </form>
      </div>
    </details>
    <br>
    <details>
      <summary>IMG Analyzer</summary>
      <div id="voperations">
        <form enctype="multipart/form-data" method="POST">
          <input type="file" accept=".jpg,.png" name="file" id="vfile-input">
          <div id="vfeedback"></div>
          <button id="vuploadBtn" class="btn btn-primary" type="submit">Upload</button>
          <button type="button" class="btn btn-secondary" onclick="getChatGPTResponseIMG();">Analyze</button>
        </form>
      </div>
    </details>

    <hr>
    <button id="showChatButton" class="btn btn-secondary">Show Memory</button><br>
    <button id="savetxt" class="btn btn-secondary">Export Chat</button>
    <hr>
    <select id="selectOption">
      <option selected>Select personality</option>
      <option value="01">Full Stack Developer</option>
      <option value="02">.NET Developer</option>
      <option value="03">Wordpress Master</option>
      <option value="13">Direct Web Bot</option>
    </select>
    <br>
    <input type="text" id="search-input" placeholder="Search in chats...">
    <button id="search-button" class="btn btn-secondary">Search</button>
  </aside>

  <div id="chathistory"></div>
</section>
</main>

<p><small>Powered by OpenAI API</small></p>

<script>
function myFunction() {
  var x = document.getElementById("myTopnav");
  if (x.className === "topnav") {
    x.className += " responsive";
  } else {
    x.className = "topnav";
  }
}

const COMPACTION_THRESHOLD = 12000;
let preserveCodingMode = false;

let chatMemory = [];

function createMemory(messages) {
  const memory = [];
  for (const msg of messages) {
    memory.push({ role: msg.role, content: msg.content });
  }
  return memory;
}

async function sendMessage() {
  const apikey = localStorage.getItem("openaikey");
  document.getElementById("apikey").value = apikey;
  if (apikey === "") {
    alert("No OpenAI API Key found.");
    return;
  }
  const inputElement = document.getElementById("prompt");
  const userInput = inputElement.value.trim();
  if (userInput === "") return;
  showMessage("Guest", userInput, "");
  const estimatedTokens = estimateTokens(chatMemory);
  if (estimatedTokens > COMPACTION_THRESHOLD) {
    showMessage("System", "Compacting conversation...", "");
    chatMemory = await implementCompaction(chatMemory, "gpt-4o-mini", preserveCodingMode);
  }
  chatMemory = await getChatGPTResponse(userInput, chatMemory);
  inputElement.value = "";
}

function estimateTokens(memoryArray) {
  const allText = memoryArray.map(m => m.content).join(" ");
  return Math.ceil(allText.length / 4);
}

async function implementCompaction(chatMemory, model, preserveCoding) {
  const summaryPrompt = "Summarize the conversation keeping essential information." + (preserveCoding ? " Preserve code blocks." : "");
  const apikey = localStorage.getItem("openaikey");
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      Authorization: "Bearer " + apikey,
    },
    body: JSON.stringify({
      model: model,
      messages: [...chatMemory, { role: "user", content: summaryPrompt }],
      max_tokens: 4096,
    }),
  });
  if (!response.ok) throw new Error("Compaction error");
  const data = await response.json();
  const summaryText = data.choices[0].message.content;
  return [
    { role: "system", content: "Compacted context" },
    { role: "assistant", content: summaryText },
  ];
}

function showMessage(sender, message, tokens) {
  const chatContainer = document.getElementById("chathistory");
  const messageElement = document.createElement("div");
  if (sender !== "Guest") {
    messageElement.innerHTML = `${sender}: ${message}<br><small>${tokens}</small>`;
    messageElement.classList.add("chatgpt-message");
  } else {
    messageElement.innerText = `${sender}: ${message}`;
    messageElement.classList.add("user-message");
  }
  chatContainer.appendChild(messageElement);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

async function getChatGPTResponse(userInput, chatMemory) {
  const apikey = localStorage.getItem("openaikey");
  document.getElementById("apikey").value = apikey;
  if (apikey === "") {
    alert("No OpenAI API Key found.");
    return;
  }
  const chatContainer = document.getElementById("chathistory");
  const typingIndicator = document.createElement("p");
  typingIndicator.id = "typing-indicator";
  typingIndicator.innerHTML = '<img src="preloader.gif" class="preloader" alt="Loading...">';
  chatContainer.appendChild(typingIndicator);
  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + apikey
      },
      body: JSON.stringify({
        model: "gpt-5-chat-latest",
        messages: [...chatMemory, { role: "user", content: userInput }],
        max_tokens: 15999
      })
    });
    if (!response.ok) throw new Error("API Error");
    const data = await response.json();
    if (!data.choices || !data.choices[0].message) throw new Error("Invalid response");
    const chatGPTResponse = data.choices[0].message.content.trim();
    let cleanResponse = chatGPTResponse
      .replace(/(```html|```css|```javascript|```json|```js|```php|```python)(.*?)/gs, "$2")
      .replace(/```/g, "")
      .replace(/\*\*(.*?)\*\*/g, "$1")
      .replace(/^#{1,6}\s*(.+)$/gm, "$1");
    let tokenInfo = "";
    if (data.usage) {
      tokenInfo = `Tokens: ${data.usage.total_tokens}`;
    }
    chatContainer.removeChild(typingIndicator);
    showMessage("VivacityGPT", cleanResponse, tokenInfo);
    chatMemory.push({ role: "user", content: userInput });
    chatMemory.push({ role: "assistant", content: cleanResponse });
    return chatMemory;
  } catch (error) {
    console.error(error);
    alert("An error occurred during the request.");
  }
}

document.getElementById("savetxt").addEventListener("click", () => {
  const chatContent = document.getElementById("chathistory").innerText;
  const blob = new Blob([chatContent], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "chat_" + new Date().toISOString().replace(/[-:.]/g, "") + ".txt";
  link.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
